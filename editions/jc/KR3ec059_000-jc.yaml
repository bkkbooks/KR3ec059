body:
  text: 心部藥隊補心猛將北五味害酸鹹為多能斂肺氣氣為衛若邪風在表痧疹初發一切停飲肺家有實熱者皆當禁服之恐閉其邪氣多致勞嗽虛熱蓋收補之驟也利性溫五味具備酸鹹為多收肺而療咳定喘補腎而壯水澀精酸收而心守其液故為補心猛將肝腎同源又為補肝猛將修治八月採實陰乾凡用蜜浸焙乾入補藥熟用入嗽藥生用肺寒氣逆與乾薑同用按五味酸斂如勞損久咳肺氣耗散非此不能收其耗散之金酸棗仁害凡肝膽心脾有實熱邪者勿用以其收斂故也利性平能補益肝膽酸收而心守其液乃固表虛有汗肝旺而血歸其經用療徹夜無眠修治八月採實陰乾四十日成生用療熱好眠炒香熟用療膽虛不寐煩渴虛汗等症自汗為陽虛盜汗為陰虛斂虛即所以治盜汗也非斂陽虛自汗也柏子仁害仁體多油辛潤且滑腸泄瀉者勿服膈間多痰及陽道數舉腎家有熱暑濕作瀉法在咸禁利甘辛香平入心養神入腎定志安神定悸壯水強陽潤血而容顏美少補虛而耳目聰明修治九月採子蒸曝春礧取仁酒浸一宿曬乾炒研去油用油透者勿入藥遠志肉害此無補性虛而挾滯者同養血補氣藥用交通心腎資其宣導臻於太和不可多用獨用純虛無滯者誤服之令人空洞懸心痛凡心經有實火應用黃連生地者禁與參術等補陽氣藥同用也利性溫苦泄辛散定心氣止驚益智補腎氣強志益精善療癰毒敷服皆可修治四月採根葉陰乾去心否則令人煩悶甘草湯浸焙乾或鹽水炒或薑汁炒或用炭附小草益精補陰氣止虛損遺泄交通心腎調平水火之功丹參害雖能補血長於行血設經早期或無血經阻及血少不能養胎而胎不安與產後血已暢者皆不可犯犯之則成崩漏之患凡溫熱病邪在氣分而誤用之則反引邪入營不可不慎之久服多眼赤故應性熱本經云微寒恐謬也孕婦無故及陰虛之人忌用利苦微寒入心主血去瘀生新安神養陰安生胎落死胎胎前產後帶下崩中需之修治北方產者良五月採根曝乾豬心血拌炒或酒炒用龍眼肉利甘平補心虛而長智悅胃氣以培脾除倦忘與怔忡能安神而熟寐道家服龍眼肉細嚼千餘待滿口津生和津汩汩而咽此即服玉泉之法也修治七月實熟白露後方可採摘曬乾焙生者沸湯瀹過食不動脾其核去黑殼研末止金瘡出血麥門冬害性潤動脾便滑者忌害性寒而潤寒多人禁服凡虛寒泄瀉及痘瘡虛寒作泄產後虛寒泄瀉者咸忌之徐洄溪批葉按虛勞咳嗽部云麥冬能閉肺竅遂致失音愚謂咳嗽因於濕者濕為重濁之邪以麥冬能膩隔勢必濕熱壅滯肺失清肅肺為聲音門戶金實則無聲也利甘微寒清心瀉熱滋燥金而清水源又為涼三焦次將地黃車前為使脈氣欲絕者加五味子人參三味合名生脈散補中元氣不足蓋心主脈肺朝百脈補肺清心則氣充脈復修治浙產甚良四月初採根栽夏至前一日取根曬乾收之抽心用不爾令人煩近時多連心用恐滑腸用米炒黃寧心用辰砂少許拌入丸散須瓦焙熟即於風中吹冷如此三四次即易燥而不損藥力麥冬之功在潤燥非在滋陰蓋肺熱而喜潤故曰清金保肺肺與大腸相表裡故曰滑腸泄瀉者忌用當歸害氣味辛溫雖能補血活血終是行血走血之性故能滑腸其氣與胃氣不相宜故腸胃薄弱泄瀉溏薄以及一切脾胃病惡食不思食及食不消者並禁用即在胎前產後亦忌辛溫發散甚於麻黃細辛氣虛血弱有熱者犯之發痙惡櫚茹濕面畏菖蒲海藻生薑利甘辛溫去瘀生新舒筋養營溫中潤腸心主血肝藏血脾統血歸為血藥故入三經頭止血尾破血全和血能引諸血歸經故名歸尾一稱歸鬚修治二月採根陰乾頭尾圓多紫色肥潤氣香里白不油者良以秦產馬尾歸最勝力柔善補川產力剛善攻他處鑱頭當歸只宜發散藥耳本病用酒炒如吐血須醋炒或用酒炒黑有痰用薑汁炒凡曬乾乘熱紙封甕收之不蛀按當歸炒極黑能治血澼血痢炒焦則味苦苦則澀血也補心次將白芍藥害酸寒收斂凡胃弱中寒作泄腹中冷痛及胃中覺冷等症當禁傷寒病在上焦之陽結忌用血虛有熱者宜之產後酒炒用又曰產後忌用丹溪曰以其酸寒伐生髮之氣也必不得已酒炒用之可耳時珍曰產後肝血已虛不可更瀉也惡芒硝石斛畏硝石鱉甲小薊反藜蘆案肝臟病患者不宜大量長期服用朱顏注利苦酸微寒斂肺而涼血制肝以安脾心主血涼血故補心酸收而守其液也及一切血病同白朮補脾同參耆補氣同歸地補血同川芎瀉肝同甘草名芍藥甘草湯止腹痛蓋腹痛因營氣不從逆於肉裡故也修治八九月取根曬乾用竹刀刮去皮並頭銼切細蜜水拌蒸今多生用單瓣花者入藥用酒炒制寒醋炒行血下痢後重不炒用多服則損人目汗多人服之亦損元氣夭人為其淡而滲也中寒者勿服茯苓神害功專行水伐腎病人腎虛小便自利或不禁虛寒精滑及陰虧而小便不利者皆勿妄投茯苓赤筋若誤服之令人瞳子並黑睛點小兼盲目二茯俱惡白蘞畏地榆秦艽鱉甲忌米醋酸物雄黃等馬藺為使利味甘平淡治與茯苓同功入心之用居多交心腎而安神定志開心益智療心虛驚悸多恚善忘修治搗細於水盆中攪濁浮者濾去之曝乾切用須於二八月採取陰乾凡用去心寧心用辰砂拌按神農本草經止言茯苓別錄始分茯神茯神中守而茯苓下利白者入肺膀胱氣分赤者入心小腸茯苓木又名黃松節即茯神中心松節散乳香木瓜湯治一切筋攣疼痛乳香能伸筋木瓜舒筋也茯神心木寧心神療諸筋攣縮偏風喎斜心掣健忘豬心血害宰豬驚氣入心絕氣歸肝俱不可多食利用作補心藥之嚮導蓋取以心歸心以血導血之意修治用竹刀將豬心剖開取出拌炒補心藥丹參之類琥珀害淡滲傷陰凡陰虛內熱火炎水虧者勿服若血少而小便不利者服之反致燥急之苦利甘平入心肝肺膀胱四經安神而鬼魅不侵色赤入血分故能消瘀血破癥瘕生肌能清肺而利小便甘淡上行能使肺氣下降而通膀胱故能治五淋又能散瘀血而生新血去翳障而能明目經曰脾氣散精上歸於肺通調水道下輸膀胱凡淡滲藥皆上行而後下降琥珀脂入土而成寶故能通塞以寧心定魂以燥脾土之功修治松脂入土年久結成入地亦能結成以手心摩熱拾芥者真以柏子仁入瓦鍋同煎半日搗末淮小麥害小麥寒氣全在皮故面去皮則熱熱則壅滯動氣發渴助濕令人體浮皆其害也凡大人脾胃有濕熱及小兒食積肝脹皆不宜服然北人以之代飯常御而不為患者此其地勢高燥無濕熱重蒸之毒故面性溫平其功不減於稻粟耳東南卑濕春多雨水其濕熱之氣鬱於內故食之過多每能發病也夏月虐痢人尤不宜食利甘微寒養心除煩利溲止血止渴收汗浮小麥澀斂涼心止虛汗盜汗治骨蒸勞熱麩皮與浮麥同性止汗之功稍遜醋拌蒸熨腰腳折傷風濕痹痛胃腹滯氣能散血止痛麵筋甘涼解熱和中面甘溫補虛養氣助五臟厚腸胃北方者良素問云麥屬火心之谷也修治秋種冬長春秀夏實具四時中和之氣四月採新麥性熱陳麥平和浮麥即水淘浮起者焙用合歡皮害氣味平和與病無忤利甘平安五臟和心志令人歡樂無憂和血止痛明目消腫續筋骨長肌肉殺蟲和調心脾得酒良修治採無時不拘去粗皮炒用入煎為末熬膏外治並妙龍角害同龍骨見肝部利辟邪治心病修治亦同瀉心猛將牛黃害小兒傷乳作瀉脾胃虛寒者忌之東垣云牛黃入肝治筋中風入藏者用以入骨追風若中府中經者誤用之反引風入骨如油入面莫之能出為害非輕有平素積虛而一時驟脫者景岳以非風名之尤忌用之利苦甘涼瀉心主之熱攝肝臟之魂利痰涼驚通竅辟邪治中風入臟驚癇口噤能入筋骨以搜風得丹皮菖蒲良人參為使石菖蒲害辛香偏燥而散陰血不足者禁之精滑汗多者忌用若多用獨用亦耗氣血而為殃犯鐵器令人吐逆惡麻黃忌飴糖羊肉鐵器惟秦艽為使利芳香利竅辛溫達氣宣五臟開心孔利九竅明耳目發聲音去濕除風逐痰消結開胃寬中療噤口毒痢口噤雖是脾虛亦有熱閉胸隔所致用山藥木香皆失唯參苓白朮散加菖蒲胸次一開自然思食芳香利竅心開智長為心脾胃之良藥能佐地黃天冬之屬資其宣導鮮菖蒲汁稍涼而功勝於乾者修治二八月採生水石間不沾土根瘦節密一寸九節者佳去毛微炒按菖蒲搗汁沖用為斬關奪門之將於痰火實者宜之黃連害虛寒為病大忌凡病人血少氣虛脾胃薄弱血不足以致驚悸不眠兼煩熱躁渴及產後不臥血虛發熱泄瀉腹痛小兒痘瘡陽虛作泄行漿後泄瀉老人脾胃虛寒作瀉虛人天明飧泄病名腎泄真陰不足內熱煩躁諸症法咸忌之犯之使人危殆久服黃連苦參反熱從火化也蓋炎上作苦味苦必燥燥則熱矣且苦寒沉陰肅殺伐傷生和之氣也惡菊花元參殭蠶白蘚皮畏款冬牛膝忌豬肉令人泄瀉黃芩龍骨為使勝烏頭解巴豆毒利大苦大寒瀉心肝火而燥濕與官桂同行能使心腎交於頃刻海藏曰瀉心實瀉脾也實則瀉其子或用甘草以調其苦或加人參以節制之修治本經心火生用肝火膽汁炒上焦火酒炒中焦火姜炒下焦火鹽水炒或童便炒食積火土炒濕熱在氣分吳萸湯炒在血分醋炒點目人乳浸亦可二八月採根曝乾川中種連色黃軟毛無硬刺味微苦而薄服之無效六七月根緊始堪採雅州連細長彎曲微黃無毛有硬刺馬湖連色黑細繡花針頭硬刺形如雞爪此二種最佳按黃連苦燥血虛有熱不可用者入心恐助心火也木通古名通草害苦降淡滲利竅凡精滑不固夢遺及陽虛氣弱內無濕熱者均忌妊娠尤忌利辛甘淡平入心肺小腸膀胱瀉濕熱降心火清肺熱化津液下通大小腸導諸濕熱由小便出通血脈下乳行經催生墜胎防己苦寒瀉血分濕熱木通甘淡瀉氣分濕熱君火為邪宜用木通相火為邪宜用澤瀉利水雖同所用各別又治胸中煩熱大渴引飲淋瀝不通脾熱好眠修治正二月採枝陰乾洗切片用又與琥珀同功但能泄熱不能通瘀辰砂害鎮養心神但宜生使若經伏火及一切烹煉則毒等砒硇服之必斃戒之獨用多用令人呆悶畏鹽水惡磁石忌一切血若火煉則有毒服餌常殺人須細水飛三次利甘涼體陽性陰瀉心經熱邪鎮心定驚辟邪清肝明目祛風解毒胎毒痘毒宜之色赤屬火性反涼者離中虛有陰也味甘者火中有土也修治辰產明如箭鏃者良研末犀角害大寒之性非大熱者不可濫用凡痘瘡氣虛無火熱者不宜用傷寒斑疹陰症發躁因陰寒在內逼其浮陽外越失守之火聚於胸中上衝咽嗌故面赤手溫煩嘔喜飲涼物下食良久後出惟脈沉細足冷雖渴而飲水不多且復吐出為異於陽症耳不宜誤用犀角涼劑孕婦服之能消胎氣忌鹽升麻為使利苦酸鹹寒涼心瀉肝清胃中大熱祛風利痰涼血辟邪解毒明目定驚治吐血下血畜血發狂發斑痘瘡黑陷消癰化膿又云犀食百草之毒故能解毒修治犀角有黑白二種以西番生犀黑者銼屑綿包或磨汁用入丸散烏而光潤者良角尖尤勝鹿取茸犀取角尖現成器物多已被蒸煮不堪入藥入湯劑當以綿薄紙裹於懷中蒸燥乘熱搗之應手如粉又云人氣粉犀瀉心次將山梔仁害稟苦寒之性慮傷胃氣而傷血凡脾胃虛弱及血虛發熱者忌之能瀉有餘之火心肺無邪熱者忌心腹痛不因火者尤忌小便不通由於膀胱虛無氣以化而非熱結小腸者亦不可用瘡瘍因氣血虛不能收斂則為久冷敗瘡非溫暖補益之劑則不愈所謂既潰之後一毫寒藥不可用是也世人每以治血不知血得寒則凝反為敗症利苦寒清心肺脾胃治胸中懊憹而安眠臥疏臍下血滯而利小便瀉三焦之火使屈曲下行梔皮苦寒性減而清膚熱之用長修治九月採實曝乾洗去黃漿生用吐胃中邪熱當以傷寒類方參看炒黑止血薑汁炒止煩嘔內熱用仁表熱用皮苦寒之品宜於實熱者蓋伐生氣故也連翹害清而無補之品癰疽潰後勿服火熱由於虛者勿服苦寒礙胃多餌即減食脾胃薄弱易作泄者勿服利苦寒入心包膽三焦大腸手少陰主藥也除心經客熱陽明濕熱散諸經血凝氣聚利水通經諸痛瘍瘡皆屬心火故為瘡家聖藥翹心更苦寒瀉心火尤勝溫熱入心營非此不能治修治八月採取陰乾手搓用之按連翹除血熱山梔治火鬱雖同入血分治法兩途通草害其氣寒降中寒者勿服虛脫人及孕婦均忌利色白氣寒體輕味淡故入肺經引熱下行味淡而升故入胃經通氣上達而下乳汁凡利小便必先上清心火而後能下行也陰竅澀而不利水腫閉而不行用之立通故名之修治採莖肥大圍數寸者取莖中瓤正白用車前子葉害其性冷利專走下竅雖有開水竅以固精竅之功若遇內傷勞倦陽氣下陷之病腎虛脫者皆在禁例利甘寒清心利膀胱小水以解濕熱催生止瀉明目益精男女陰中有二竅一竅通精乃命門真陽之火一竅通水乃膀胱濕熱之水二竅不並開水竅開則濕熱外泄相火常寧精竅常閉久久精足則目明服固精藥久服此行房即有子車前葉涼血去熱通淋修治五月採取洗去泥沙曬乾炒過用入丸散酒浸一夜蒸焙研使葉勿使莖蕊竹捲心害竹性寒涼胃寒嘔吐及感寒挾食作吐者忌用竹能損胃氣故虛人食筍甚不相宜利辛淡甘寒入心肺腎清心滌煩熱止嗽化痰涎捲心者佳竹葉力減然藥力薄弱不可持以為君不過藉此佐使耳修治淡竹為上甘竹次之須用生長甫及一年者為嫩而有力仲景治傷寒解後氣逆欲吐用以竹葉石膏湯去其三陽之餘熱假其辛寒以散風熱也燈心害性專通利虛脫人不宜用中寒小便不禁勿服利淡平清心瀉小腸而利水燒灰吹喉痹塗乳止夜啼修治入藥宜用生干剝取生草寧心辰砂拌用入丸散以梗粉漿染過曬乾研末入水澄之浮者是燈心蓮子心一名蓮薏害蓮子性澀大便燥者勿服生食過多微動氣脹利蓮子中青心苦寒清心去熱蓮子甘平而澀入心脾腎能交水火媾心腎而靖君相之火邪厚腸胃而收瀉痢之滑脫頻用能澀精多服令人喜古方治心腎不交勞傷白濁有蓮子清心飲補心腎有瑞蓮丸石蓮子害沉陰之物無濕熱而虛寒者勿服利苦寒清心除煩開胃進食去濕熱專治噤口痢淋濁症需之修治八九月採堅黑如石者破房得之墮水入泥者更良今肆中多以廣中樹上木實偽充其味大苦不堪入藥真者其味甘味淡微苦杵碎用安息香害病非關邪惡氣侵犯者勿用利辛香苦平入心經研服行血下氣安神蠱毒可消心經主藏神神昏則邪侵之心主血血滯則氣不宣快安神行血故治也修治安息國名也或云辟邪安息諸邪故名出西番樹名辟邪其脂結成狀若桃膠秋月採之燒之能集鼠者真乳香一名薰陸香害辛香善竄瘡疽己潰勿服及諸瘡膿多勿敷利辛溫入心通行十二經活血舒筋和氣治痢托裡生肌定諸經之痛解諸瘡之毒護心外宣毒氣是有奇功也產難斫傷亦治癲狂能祛風散瘀修治出諸番圓大如乳頭明透者良性黏難研水沸過用缽坐熱水中以燈心同研則易細今松脂楓脂中亦有此狀者市人或以偽之金銀箔害生金解毒惡而有毒不煉服之殺人且難解畏水銀錫利辛平入心肝安鎮靈臺免於神魂飄蕩闢除惡祟搜其臟腑伏邪金制木故能治驚癇風熱肝膽之病皆需之又催生亦用之銀用足紋功亦相仿丸散用箔為衣誤吞金銀食炒熟連長韭菜能裹住金銀從大便而出元絲銀有硝毒害人修治凡使金銀銅鐵只可懸煎於藥銚中借氣以生藥力而已勿入藥服能消人脂入藥金銀用箔或用簪環首飾凡使銀箔須辨銅箔山豆根害大苦大寒脾胃所惡食少而瀉者切勿沾唇虛人亦忌利苦寒瀉心火以保肺金去大腸風熱解咽喉痛蠱毒消諸腫瘡瘍喘滿熱咳瀉熱解毒治熱極所致之病修治苗蔓如豆經冬不凋八月採根曝乾天竺黃害性寒涼久用亦能寒中利甘寒入心經祛風痰解風熱鎮心肝安五臟瀉熱豁痰利竅養心治大人中風不語小兒客忤驚癇其氣味與竹瀝同功而性稍和緩無寒滑之患修治生南海鏞竹中此是竹內所生如黃土著竹成片片如竹節者真此竹極大又名天竹津氣結成其內有黃本草作天竺者非採無時黃丹一名鉛丹害性味沉陰能損陽鉛粉主治略同內服雖能消疳逐積殺蟲然其性冷善走如脾胃虛弱者不宜用妊婦亦忌利鹹寒鎮心安魂墮痰消積殺蟲治驚疳瘧痢外用解熱拔毒止痛生肌長肉凡使燥濕墜痰解熱但宜外用修治黑鉛加硝黃鹽礬煉成凡用水漂淨炒紫色出火毒象牙害苦寒之極不利脾胃凡疳症脾弱目病血虛者不宜多服利甘苦涼清心腎之火療風癇驚悸骨蒸痰熱瘡毒銼屑煎服氣和味平於藏府無逆象肉壅腫以刀刺之半日即合治金瘡不合者用其皮灰亦可熬膏入散為合金瘡之要藥長肌肉之神丹諸鐵及雜物入肉刮牙屑和水敷之立出諸物刺咽磨水服之亦出修治出西番象每脫牙自埋藏之崑崙諸國人以木牙潛易取焉真珠害珠體最堅研不細能損人臟府病不由火熱者勿用利甘鹹寒水精所蘊入心肝二經鎮心安魂墜痰明目治聾驚熱痘疔下死胎胞衣拔毒收口生肌修治河蚌感月而胎取新潔未鑽織者人乳浸三日研粉極細如飛面用心肝藏神魂大抵寶氣多能鎮心安魂瀉火定驚如金箔琥珀真珠龍齒之類亦借其神氣也赤小豆害最滲津液久服令人枯燥肌瘦身重凡水腫脹滿總屬脾虛當雜補脾胃藥中用之病已即去勿過劑也利甘酸平入心小腸性下行而通行水散血去蟲止渴行津液清氣分滌煩蒸通乳汁胎產最要除痢疾止嘔吐脾胃最宜治有形之病消脹散腫凡瘡疽潰爛幾絕者為末敷無不立效雞子青調塗性黏干則難揭入苧根末則不黏未潰者箍之則四斂中起已潰者敷之就瘥相想子苦平研服能治心腹邪氣風痰瘴瘧及蠱毒修治深秋八月採以緊小而赤黯色者入藥其稍大而鮮紅淡紅色者並不治病今肆中半粒黑者是相思子一名紅豆有毒鬱金害今醫用此開鬱罕效如真陰虛火亢吐血不關火炎搏血妄行溢出上焦不關肺肝氣逆以傷肝吐血者不宜用也近日鬱症多屬血虛用破血之藥開鬱不能開而陰已先敗致不救者多矣今市中所用者多是薑黃並有以蓬朮偽之者俱峻削性烈病挾虛者大忌利苦辛微甘氣寒人心及包絡肺肝四經開血積氣壅生肌定痛本入血分之氣藥其治吐血衄血婦人經脈逆行者血屬火炎此能降氣氣降即火降而性入血故能導血歸經解肝鬱瀉火涼血破瘀修治有川產廣產其根體銳圓如蟬腹外黃內赤去皮火干色鮮微香折之光明豔徹苦中帶甘者乃真敲碎入煎或磨汁沖白茅根害吐血因於虛寒者非其所宜因寒發噦中寒嘔吐濕痰停飲發熱並不宜服利甘寒入心脾胃小腸四經涼金定喘平血逆清血瘀利水濕療淋瀝崩中茅花止血茅針潰癰一針潰一孔能瀉火消瘀涼血止噦修治三月採針四月採花六月掘根去毛用人中黃害苦寒之極不利於脾胃虛寒傷寒溫疫非陽明實熱者不宜用痘瘡非火熱鬱滯因而紫黑干陷倒靨者不宜用利苦寒入心一作胃清痰火消食積大解五臟實熱治陽毒發狂清痘瘡血熱解百毒敷疔腫金汁主治同人中黃而功勝瀉實熱修治用竹筒刮去青皮納甘草末於中緊塞其孔冬月浸糞缸中至春取出洗懸風處陰乾取末制金汁法棕皮綿紙上鋪黃土淋糞濾汁入新甕碗覆埋土中一年清若泉水全無穢氣勝於人中黃年久彌佳肝部藥隊補肝猛將枸杞子害雖為益陰除熱之要藥若脾胃虛弱時泄瀉者勿入須先理脾胃俟瀉止用之須同山藥蓮肉車前茯苓相兼則無潤腸之患故云脾滑者勿用利甘微溫滋肝益腎填精堅骨助陽養營補虛勞強筋明目除煩止渴利大小腸故又為溫大腸猛將修治九月採子酒潤一夜搗爛入藥或用炭以甘州河西所產紅潤少核者佳烏梅害病有當發表者大忌酸收誤食必為害非淺食梅則津液泄者水生木也津液泄則傷腎腎屬水外為齒故多食損齒傷筋蝕脾胃令人發膈上痰熱利酸澀而溫補肝膽入肺脾血分定久嗽定渴斂肺之勳止血痢澀腸之力清音去痰涎安蛔理痰熱消酒毒蝕惡肉疽愈後有肉突起烏梅燒敷一日減半二日而平真奇方也肝以酸為瀉而又以本味為補肝膽猛將修治去核微炒或蒸熟白梅害按素問云味過於酸肝氣以津又云酸走筋筋病無多食酸雖能生津泄肝然酸味斂束違其所喜也不宜多食齒痛及病當發散者咸忌之利烏梅白梅所主諸病皆取其酸收之義功用略同牙閉擦齦涎出便開刀傷出血研敷即止修治青梅燻黑為烏梅鹽煮為白梅亦曰霜梅安吉者肉厚多脂最佳五月採實火干過食而齒齼嚼胡桃肉解之熟者笮汁曬乾收為梅醬夏月渴調水飲之補肝次將山茱萸肉害凡命門火熾強陽不痿者忌之膀胱熱結小便不利者法當清利此藥味酸主斂不宜用陰虛濕熱不宜用即用當與黃柏同加惡桔梗防風防己利酸澀微溫固精秘氣補肝膽腎強陰助陽事暖腰膝縮小便閉遺泄還耳聰而已其響調月事而節過多蓼實為使修治五月採實陰乾以酒潤去核緩火熬干方用核能滑精不可服菟絲子害其性溫燥偏補凝正陽之氣能助人筋脈腎家多火強陽不痿大便燥結者忌之利甘辛溫入肝腎脾續絕傷益氣力強陰莖堅筋骨溺有餘瀝寒精自出勞損口苦渴煎湯任意飲之寒血為積為調元上品得酒良山藥松枝為使修治九月採實曝乾凡用以溫水淘去沙酒浸一宿曝乾搗之不盡者再浸搗須臾悉作餅焙乾用何首烏害此為益血之物相惡與萊菔同食令人鬚髮早白忌與附子仙茅薑桂等諸燥熱藥同用若犯鐵器損人利苦甘澀微溫入肝腎收精氣補真陰強筋益髓壯陽事為滋補良藥養血祛風虛勞瘦痿弱瘰癧補肝瘧家要藥補益肝腎調和氣血澀氣化虛痰白雲苓為使修治秋冬取根大者如拳竹刀刮皮米泔浸一夜切片用黑大豆拌蒸曬乾如此九蒸九曬乃用或生用沙苑蒺藜害性能固精若陽道數舉媾精難出者勿服反成淋濁利甘溫補腎益肝強陰益精虛勞腰痛遺精帶下修治以酒拌蒸或鹽水炒用今肆中所賣者俱是花草子真者絕無出潼關狀如腎子帶綠色鱉甲害其性陰寒肝虛無熱者忌用鱉肉涼血補陰陰冷而難消脾虛者大忌惡礬石忌莧菜雞子利鹹寒平屬陰色青入肝補陰退熱而散結治厥陰血分之病勞瘦骨蒸寒熱溫瘧母及經阻難產腸癰瘡腫驚癇斑痘元氣虛羸邪陷中焦鱉甲能益陰熱鱉色青治皆肝症龜色黑主治皆腎症同歸補陰實有分別龜板以自敗大者為佳鱉肉涼血補陰亦治瘧痢加生薑砂糖煮作羹食名鱉糖湯鱉血如用柴胡加入數匙而不過表修治色綠九肋九重七雨者為上醋炙或酒炙黃或生用刮白除其腥氣恐有倒胃之弊治勞童便炙亦可熬膏良龍骨害其性澀而收斂凡泄利腸澼及女子漏下崩中溺血等症皆血熱積滯而為患法當通利疏泄不可便用止澀之劑恐積滯瘀血在內反能為害惟久病虛脫者不在所忌畏石羔川椒魚腥及鐵器利甘澀平入心腎肝大腸經能收斂浮越之正氣澀腸益腎固精安魂鎮驚辟邪解毒治多夢紛紜斂汗收脫縮小便生肌肉得人參牛黃良修治查近世之修治方法但煅赤為粉亦有生用者或酒浸一宿焙乾研粉水飛三次用如急用以酒煮焙乾或云凡入藥須水飛曬乾每斤用黑豆一斗蒸一伏時曬乾用否則著人腸胃晚年作熱也龍齒尤能定驚鎮心安魂龍潛藏於水氣入腎藏中骨主腎病故又益腎也肝藏魂能變化魂飛不定者治之以龍齒金毛狗脊害其性溫燥腎虛有熱小水不利或短澀赤黃口苦舌乾皆忌之惡敗醬莎草利苦平入肝腎二經強筋壯骨治男子腰腳軟疼女人關節不利萆薢為使毛名金毛獅子止金瘡血出良修治二八月採根曝乾火燎去須切細子酒浸一夜蒸三時取出曬乾用一名扶筋川續斷害禁與苦寒藥同用以治血病及與大辛熱藥用於胎前另有一種草茅根形如續斷誤服令人筋軟惡雷丸利味苦辛微溫補肝腎通血脈理筋骨主勞傷暖子宮縮小便止遺泄破瘀血腰痛胎漏崩帶腸風血痢痔毒又主金瘡折跌止痛生肌癰腫宜收胎產莫缺地黃為使修治川產良狀如雞腳皮黃皺節節斷者真七八月採根去向里硬筋酒浸伏時焙乾入藥冬瓜子瓜一名白瓜害瓜性冷利凡臟府有熱者宜之冷者食之瘦人若虛寒腎冷久病滑泄者勿食令人反胃須起霜食之乃佳利甘平補肝明目清肺潤痰瓜其性寒瀉熱甘益脾利二便止消渴消水腫散熱毒癰腫皮甘寒益脾以皮行皮故通二便能消水腫瀉熱毒止消渴葉治消渴瘧疾寒熱修治七八月採待霜降後取之收藏彌年可作菜果入藥漆麝香及糯米觸之必爛其子在瓤中成列剖取去瓤曝乾用凡藥中所用瓜子皆冬瓜子也雞害性熱動風凡熱病初愈癰疽未潰素有風痰人咸忌之年久老雞腦有大毒食之能發疔中其毒發疔者以玉樞丹解之冠血性溫痘瘡虛寒者得之固可資其起發倘因血熱而乾枯焦黑者誤用能更轉劇世人屢用冠血桑蠹蟲發痘而不分寒熱者誤也雞有五色黑雞白首者六指者四距者雞死足不伸者閹雞能啼者並不宜食食之害人利甘溫屬巽屬木補虛溫中動風煮汁性滑而濡烏骨雞甘平屬水能益肝腎退熱補虛治肝腎血分之病雞冠居清高之分其血乃精華所聚雄而丹者屬陽故治中惡驚忤熱血瀝口塗吹鼻本乎天者親上故塗口眼喎斜雞子甘平鎮心安五臟益氣補血散熱定驚止嗽止痢多食令人滯悶哺雞蛋殼主傷寒勞復研敷下疳麻油調搽痘毒神效鳳凰衣主久咳結氣失音雞屎白微寒下氣消積通利大小便內經用治蠱脹合米炒治症醋和塗蚯蚓蜈蚣咬毒雞肫皮一名雞內金一名肶胵音皮鴟甘平性澀雞之脾也消水殺蟲除熱止煩通小腸膀胱治瀉痢便數遺溺溺血崩帶腸風膈消反胃小兒食瘧男用雌女用雄雞腸治遺溺小便數不禁雞肝治肝虛目暗治氣噎食不消四月勿食抱雞肉令人作癰成漏男女虛乏小兒五歲以下食雞生蛔雞肉不可合胡蒜芥李犬肝犬腎及兔食之恐泄痢同魚汁食成心瘕同鯉魚食成癰癤同獺肉食成遁口同生蔥食成蟲痔同糯米食生蛔修治雞雖屬木分而配之則丹雄雞得離火陽明之象白雄雞得庚金太白之象故辟邪惡者宜之烏雄雞屬木烏雌雞屬水故胎產宜之黃雌雞屬土故脾胃宜之而烏骨者又得水木之精氣故虛熱者宜之反毛雞治反胃各從其類也牛筋害老病及自死牛食之損人利甘溫補肝強筋益氣力續絕傷鹿筋同功修治臘月收採風乾用鮮者力勝羊肝害羊食毒草凡瘡家及痼疾者食之即發宜忌之反半夏菖蒲利色青補肝而明目膽苦寒點風淚眼赤障白翳羊肉熱屬火補虛勞益氣力壯陽道開胃健力強陰通氣發瘡肺通肺氣止咳嗽利小便腎益精助陽胲除翻胃角明目殺蟲血主產後血運悶絕生飲一杯即活中金銀丹石砒硫一切諸毒生飲即解也修治以竹刀切片用忌銅器及醋吐鐵害海味鹹寒中寒者忌利甘酸鹹寒補肝腎益精髓明耳目修治產寧波鄞縣南田者大而多脂為第一為海錯上品一名麥螺一名梅螺用鹽滷醃或用甜酒釀可帶出遠不入煎劑閩中者肉磈礧無脂膏不中食血餘膠害發灰走血分而帶散其主諸血證者是血見灰則止乃治標之義若仗其補益未必能也經熬煅成末後氣味不佳胃弱者勿服利苦溫平入肝腎兼補陰消瘀能去心竅之血治諸血病吐衄血痢血淋崩帶父發與蛋黃同煎治小兒驚熱已發與川椒共煅令本體烏頭胎髮尤良入芎歸湯宜用婦人頭髮產婦本發尤妙修治將發以皂莢水洗淨入罐固煅存性五加皮害下部無風寒濕邪而有火及肝腎虛而有火者勿服惡元參蛇皮利辛順氣而化痰苦堅腎而益精溫祛風而勝濕療筋骨之拘攣逐皮膚之瘀血治陰痿囊濕女子陰癢明目縮便愈瘡療疝釀尤良遠志為使修治十月採根剝皮陰乾煮根莖釀酒飲益人海螵蛸一名烏賊骨害氣味鹹溫血病多熱者勿服惡附子白芨白蘞利咸走血溫和血入肝腎血分通血脈去寒濕治血枯止腸風崩漏澀久虛瀉痢腹痛環臍陰蝕腫痛肉酸平益氣強志通月經修治出東海亦名墨魚取骨魚滷浸炙黃或漂淡用桑寄生害雜樹上者氣性不同恐反有害寇宗奭云向有求此於吳中諸邑採不得以他木寄生服之逾月而斃可不慎哉利苦堅腎助筋骨而固齒長髮甘益血止崩漏而下乳安胎舒筋絡而利關節和血脈而除痹痛修治三月採根枝莖葉銅刀細切陰乾用勿見火紫石英害石藥終燥只可暫用婦人絕孕由陰虛火旺不能攝受精氣者忌用利甘辛溫潤以去燥回枯重以鎮寧心神養肝血不足血海虛不孕者宜之暖子宮之要藥白石英甘辛微溫潤以去燥利小便實大腸治肺痿吐膿咳逆上氣十劑曰潤可去燥枯二英之屬是也潤藥頗多而徐之才取二紫白石英為潤劑存其意可也石英五色各入五臟俱畏附子惡黃連修治紫石英色淡瑩徹五稜火煅醋淬七次研末水飛白石英如水晶者良瀉肝猛將左顧牡蠣害凡病虛而多熱宜之虛而有寒者忌之腎虛無火精寒自出者非宜惡吳萸細辛麻黃利咸以軟堅化痰澀以收脫微寒以清熱補水利濕止渴海水化咸潛伏不動故體用皆陰為肝腎血分之藥用左者以平肝也貝母為使得蛇床遠志牛膝甘草良修治鹽水煮一伏時煅粉或生用海蛤蜊殼害蛤粉善消痰積血塊然脾胃虛寒者宜少用或加益脾胃藥同用為宜肉氣味雖冷與服丹石人相反食之令腹結痛凡使海蛤勿用遊波蟲骨相似只是面上無光誤餌令人狂走欲投水如鬼祟惟醋能解之利與牡蠣同功肉鹹冷止渴解酒大抵海屬鹹寒功用略同江湖蛤蚌但能清熱利濕不能軟堅蜀漆為使畏狗膽甘遂芫花修治四五月淘沙取之炭煅火研成粉或生搗碎木瓜害下部腰膝無力由於精血真陰不足者不宜用其味酸澀傷食脾胃未虛積滯多者不宜用愚謂性溫必燥腎惡燥故久服損齒及骨針經云多食之令人癃閉溺者為癃忌鐵器利酸澀而溫和脾理胃斂肺伐肝氣脫能收氣滯能和故筋急能舒筋緩能利攻濕痹治腳氣但酸收能閉小便須與車前子同用修治八月採實切片曬乾入藥宣州瓜陳生者良桃仁害性善破血散而不收瀉而無補過用之及用之不得其當能使血下不止損傷真陰凡經閉不通由於血虛而不由於瘀滯產後腹痛由於血虛空痛而不由於留血結塊大便不通由於津液不足而不由於血燥閉結誤用之大傷陰氣雙仁有毒不可用桃梟其功專於辟邪去瘀病值虛者忌與桃仁用同桃花攻決為用但可施於氣實有餘之症若無故而因除百病美顏色諸謬說而服之為害不少耗人陰血損元氣勿用千葉花令人鼻衄不止目黃藏器乃言食之患淋桃葉苦平殺蟲發汗採嫩者名桃心入藥尤勝桃子辛酸甘熱微毒多食令人有熱癰癤利桃仁苦甘平入肝大腸兩經破諸經血瘀潤大腸血燥肌有血凝而燥癢堪除熱入血結而狂言可止香附為使修治桃仁去皮尖炒黃用或麩炒或燒存性潤燥活血宜湯浸行血宜連皮尖生用以六七月採桃核敲碎取仁陰乾採之千葉者勿用以絹袋盛懸檐下陰乾用桃梟是桃實在樹經冬者正月採之實者良酒拌蒸焙乾去核用主辟邪祛祟桃為五木之精故能解邪殺鬼亦可殺蟲桃花苦平峻利通攻瀉痰飲滯血下宿水療風狂黃帝書云食桃飽入水浴令人成淋及寒熱病桃實多食令人膨脹及生癰癤有損無益與鱉肉同食患心痛服術人忌食之青橘皮害性最酷烈善破脅下小腹之滯氣然誤服之立損真氣為害不淺凡欲施用必與補脾藥同用庶免遺患必不可單用也肝脾氣虛者概勿施用辛能發汗氣虛及有汗者禁用利苦辛溫色青氣烈入肝膽氣分疏肝瀉肺引諸藥至厥陰之分下飲食入太陰之倉最能發汗柴胡疏氣青皮平下焦肝氣皮能達皮辛能發汗故又為瀉三焦猛將破滯氣愈低愈效削堅積愈下愈良修治八月採青橘皮乃橘之未黃而青色者薄而光其氣芳烈今人多以小柑小柚小橙偽之不可不慎辨之入藥以湯浸去瓤切片醋炒少用蓬莪朮害凡經事先期及一切血熱為病忌之若崩中淋露皆應補氣血涼血清熱則愈一切辛走之藥法當所禁虛人服之積未去而真氣已竭兼以參朮或庶幾耳利辛苦而辛入肝經治氣中之血破血行氣消瘀止痛若須用與健脾補元之藥同用無損耳得酒醋良修治根如生薑莪生根下似卵不齊堅硬難搗九月採削去粗皮蒸熟曝乾入氣分灰火煨透乘熱搗之入血分醋酒磨沉香害凡冷氣逆氣氣鬱氣結殊為要藥然而中氣虛氣不歸元氣虛下陷忌之心經有實邪者忌之非命門真火衰者不宜入下焦藥用陰虧火旺者切勿沾唇利性沉燥辛溫平肝降氣調中氣而胃開補下焦而腎暖理家痰涎故入腎命門暖精助陽行氣去肌膚水腫通大腸虛閉治小便氣淋修治待燥碾碎若入劑惟磨汁臨時衝入須要色黑不枯硬重沉於水油熟者為上半沉者次之不可見火嚼之香甜者性平辛辣者性熱入丸散以紙裹置懷中瀉肝次將香附害性燥苦溫之品而能耗血散氣氣虛血弱服之恐損氣而耗血愈致其疾凡月事先期因於血熱法當涼血勿用此藥誤犯則愈先期矣利氣香味辛能散微苦能降微甘能和乃血中氣藥通行十二經八脈氣分又為入金木之宮開鬱化氣發表消痰藥也統領諸藥隨用得宜乃氣病之總司女科之主帥故胎產神良得童便醋芎藭蒼朮良修治二八月採根下子陰乾火燎去毛以水洗淨石上磨去皮須生用上行胸膈外達皮膚或磨汁熟則下走肝腎外徹腰足潤燥補虛童便浸炒入血分鹽水炒行經絡酒浸炒消積聚醋炒制燥蜜炒化痰薑汁炒入腎氣鹽炒炒黑止血故統治三焦勿犯鐵器稻草煮之味不苦木香害香燥而偏於陽肺虛有熱者血枯而燥者忌之元氣虛脫及陰虛內熱諸病腫痛屬火者皆禁用丹溪曰味辛氣升若陰火衝上者反取火邪利辛苦溫三焦氣分之藥泄肺氣疏肝氣和脾氣開諸郁溫中而治心疼生用理氣煨熟止瀉以其降氣開鬱故又為瀉三焦猛將畏火修治冬月採根曬乾為藥以其形如枯骨味苦黏牙者良凡入理氣藥只生用不見火或磨汁若實腸止瀉宜麵裹東垣用黃連制亦有蒸用延胡索害辛溫走而不守經事先期虛而崩漏產後虛運均忌之利辛苦而溫入心包肺脾肝能行血中氣滯氣中血滯調經脈利產後暴血上衝折傷積血療疝舒筋理通身諸痛止腸痛心疼為活血利氣之藥也修治立夏掘取今多出浙江筧橋根如半夏黃色而堅產東陽者粒頭細生用破血炒用調血酒炒行血醋炒止血柴胡害柴胡為陰必陰氣不舒致陽氣不達者乃為恰對若陰已虛者陽方無倚而欲越更用升陽發散是速其斃矣故凡元氣下脫病屬虛而氣升者忌之嘔吐及陰虛發熱火熾炎上不因血凝氣阻為寒熱者近此正如砒鴆之毒也瘧非少陽經者勿用治瘧必用柴胡其說誤解惡皂角畏女菀藜蘆利苦微寒入肝膽三焦心包四經為少陽表藥故治瘧發表和里退熱主清陽上行解鬱調經宣暢氣血主陽氣下陷治上焦肝氣前胡半夏為使行三焦膽經黃芩為佐行心包肝經黃連為佐修治二月八月採得去須及頭用銅刀削去赤薄皮少許以粗布拭淨切用勿令犯火立使無效也酒炒則升蜜炒則和按柴胡有二種色白黃而大者為銀胡以勞瘧骨蒸虛勞疳熱色微黑者以解表發散本經無分別但用銀州者為最則知其優於升散而非除虛熱之藥明矣衍義所載甚詳故表而分之附錄一李中梓云柴胡少陽經半表半裡之藥病在太陽者服之太早則引賊入門病在陰經者復用柴胡則重傷其表世俗不知柴胡之用每遇傷寒傳經未明以柴胡湯為不汗不吐不下可以藏拙輒混用之殺人不可勝數矣勞證惟在肝經者用之若氣虛者不過些小助參耆非用柴胡退熱也若遇勞證便用柴胡不死安待惟此一味貽禍極多表而出之附錄二溫病忌用柴胡論山陽丁壽昌撰溫病四時皆有而春令尤甚經云冬傷於寒春必病溫凡冬令受寒即時發者為傷寒不即時發留連於經絡至春則寒化為熱而為病溫傷寒者傷於寒也是為陰傷陽當助其陽治以辛溫溫病者傷於溫也是為陽傷陰當救其陰治以甘寒凡溫病初起或外感風寒如荊防薄杏之類不妨少用而佐以甘寒之品清熱養陰外感本輕而身熱不退或初起脈洪口中作渴則是溫病而非傷寒一切辛溫解表之藥皆不可用輕者用桑菊飲重者用銀翹散溫病夾有斑疹者用犀角地黃湯口渴脈洪壯熱日甚者用白虎湯脈虛者加人參舌有芒刺身熱脈沉神昏譫語六七日不大解者用大小調胃承氣湯視人之強弱病之緩急酌量用之此在淮陰吳鞠通先生所撰溫病條辨中言之最悉醫家但留心此書按症服藥自無差謬溫病條辨中力戒溫病不可用辛溫發表而柴胡為尤甚何也柴胡入足少陽為發表升陽之劑溫病初起在太陽而本病則在陽明用柴胡則引入少陽謂之誅伐無過且當春少陽司令之際人多病溫溫病者陽傷陰也當救其陰而反以柴胡升少陽之氣益助其陽陽火上騰則陰水下涸是以柴胡下咽則大汗神昏遂成不治之症汗者陰液汗能亡陽亦能亡陰無汗而強發其汗傷陰而重亡其陰溫病用柴胡殺人不旋踵余目擊心傷因撰此論以示人惟願留心斯道者不吝改過普發慈心少用一劑柴胡即多活一人性命即不得已而用表散柴胡之外藥品尚多治以辛涼佐以甘寒庶不至重傷其陰致變他症有病之家亦宜慎重凡藥用柴胡及辛溫發表重劑皆棄而不用亦保全性命之一道也附錄三案柴胡之有副作用與不同品種之有毒性近年來屢有報道如煤礦醫學載柴胡注射液過敏反應報告中華內科雜誌藥物不良反應的綜合報道中亦載柴胡注射液之毒性反應又如黑龍江醫藥談到大葉柴胡有毒曾引起死亡事故黑龍江祖國醫學研究所曾有大葉柴胡毒性之探討記載有三例因嚴重中毒而死亡特附錄於此提起有關方面注意芎藭害其性辛散走泄真氣上行頭目下行血海凡病氣升痰喘虛火上炎嘔吐咳逆自汗易汗盜汗咽乾口燥骨蒸發熱作渴煩躁及氣弱人均不宜用單服久服令人暴亡亦泄其真氣使然也畏黃連硝石惡黃耆山茱萸利辛溫升浮入心胞肝膽三焦潤肝燥補肝虛乃血中氣藥升清陽而開諸郁為搜風散瘀止痛調經小者名撫芎止痢開鬱為上升辛散之力也白芷為使伏雌黃修治八月根下始結乃可掘取曝乾凡用以川中大塊里色白不油嚼之微辛甘者佳酒炒其苗作菜頗香俗呼香芹菜余西北道上曾食之金鈴子一名苦楝子害苦寒若脾胃虛寒者大忌利苦寒能導小腸膀胱之熱因引心包相火下行通利小便為疝氣要藥亦治傷寒熱厥腹痛療瘡疥殺三蟲茴香為使根皮微寒殺諸蟲通大腸採無時修治苦楝子以川中者為良十二月採得熬干酒拌蒸軟去皮核取肉用凡使肉不使核使核不使肉如使核搗碎用近惟酒炒亦有去肉取皮用則苦寒性減子如小鈴熟則黃色故名金鈴子赤芍藥害赤芍破血凡一切血虛病及泄瀉產後惡露已行少腹痛已止癰疽已潰並不宜服惡芒硝石斛鱉甲畏龜甲小薊反藜蘆利苦酸微寒瀉肝火專行惡血兼利小腸治腹痛脅痛堅積血痹疝瘕經閉腸風癰腫目赤能於土中瀉木赤散邪能行血中之滯雷丸為使修治分栽時根氣味全厚八九月掘取切片酒炒單瓣紅芍藥入藥栝蔞一名瓜蔞害寒胃滑腸胃虛少食脾虛泄瀉勿投畏牛膝乾漆惡乾薑反烏頭利苦甘潤肺疏肝滑腸涼脾為治肺熱咳嗽要藥清上焦之火使痰氣下降止一切血熱又能盪滌胸中鬱熱垢膩生津止渴清咽良劑亦能治結胸為脾熱之主藥修治九月採取栝圓黃皮厚蒂小蔞則形長赤皮蒂粗陰人服蔞陽人服栝並去殼皮革膜及油土瓜蔞功用相仿惟實熱壅滯者宜之稍挾虛切勿妄投去油搗霜潤肺之性減而涼脾之功勝利水瀉熱行血墮胎白蒺藜害細審其質性不過瀉氣破血之品故能墮胎古方俱用以為補腎者乃誤傳也愚按補腎者系潼關蒺藜今肆中所用蓋不分也利苦辛而溫瀉肺疏肝散風勝濕破血催生通乳閉消癥瘕修治七八月採子酒炒研去刺用佛手柑害單用多用亦損正氣利辛苦溫性中和理上焦肺氣而平嘔健中州脾運而進食疏氣平肝除痰止嗽修治去白或炒鮮者尤佳產閩廣古方枸椽或蒸露用鉤藤害但性稍寒無火者勿服除驚癇眩暈平息肝風相火之外他無所長凡病風溫邪未入營尚在上中二焦衛分者誤服之恐致昏譫以其輕揚入肝未免激動肝陽上升升則濁邪上蒙清竅故也利甘寒舒筋除眩暈心熱煩躁下氣寬中治小兒驚癇客忤胎風祛肝風而不燥庶幾和中今去梗純用鉤功加倍修治三月採有刺類釣鉤古方多用皮久煎則無力俟他藥煎就方入鉤藤三沸即起頗得力也時珍曰苦寒過服恐傷胃中生髮之氣反取火邪亦久服黃連反從火化之義也合歡皮見心部血竭一名麒麟竭害善收瘡口卻能引膿性急不可多用無瘀積者忌之利甘鹹平性急色赤入心肝血分散瘀生新除血痛治金瘡折跌瘡口不合止痛生肌修治出南番磨之透甲燒之有赤汁湧出久而灰不變色者真嚼之不爛如蠟為上假者是海母血味大咸有腥氣須另研作粉篩過若同眾藥搗則化塵飛也玫瑰花害畢竟伐氣之品婦人血枯氣上逆者不可多用利甘苦平香而不散色紫入肝能引血中之氣肝病用之多效木蝴蝶害氣味淡薄與病無害利治肝氣諸書不載近多用之蓋取木喜疏蝴蝶善動之意爾修治形如皂莢里多白瓤剖開取出如蝴蝶狀每張有子一粒又名千張紙錢塘趙學敏己採入本草綱目拾遺鐵落害辛平有毒素問治陽氣太盛病狂妄善怒者用生鐵落正取伐木之義本草載大清服法言服鐵傷肺者余疑肝字為準畏磁石皂莢利辛平鎮心平肝定驚療狂消癰解毒鐵屑鐵精鐵鏽鐵華大抵借金氣以平木墜下解毒無他義也鐵砂消水腫黃疸散癭瘤重以鎮墜能傷氣肝腎氣虛者忌用修治煅砧上打落者名鐵落即鐵屑如塵飛起者名鐵精器物生衣者名鐵華針砂是作針家磨鑢細末也須真鋼砂乃堪用人多以柔鐵砂雜和之飛為粉人莫能辨銅綠一名銅青害服之捐血味酸平有微毒利酸平色青入肝內科吐風痰之聚外科止金瘡之血女科理血氣之痛眼科主風熱之疼善殺蟲療疳修治以醋製銅刮用綠礬一名皂礬害綠礬礬紅雖能消食肉堅積然能令人作瀉胃弱人不宜多用服此者終身忌食蕎麥犯之立斃利酸湧涼散澀收燥濕化痰解毒殺蟲利便消食積散喉痹主治同白礬煅赤名絳礬能入血分伐肝木燥脾濕同蒼朮酒麴醋和為丸酒下治木來剋土心腹中滿或黃腫如土色者名伐木丸乃上清金蓬頭祖師傳方修治皂礬以其可染皂色故名深青瑩潔者良澤蘭害性雖和緩終是破血之品無瘀者勿輕用利苦泄熱甘和血辛散郁香舒脾微溫行血入肝脾通九竅利關節化宿血通月經消癥瘕散水腫消蠱氣味和平入血海攻擊稽留其消水腫者乃血化之水非脾虛停濕之水也防己為使修治三月採苗陰乾古方澤蘭丸甚多近今稟賦漸薄不可常用也明天麻害凡病人覺津液衰少口乾舌燥咽乾作痛大便閉澀火炎頭暈血虛頭痛及無風者忌用利辛溫入肝經氣分通血脈疏痰氣治諸風掉眩頭旋眼黑語言不遂風濕諸痹小兒驚癇子名還筒子定風補虛功同天麻修治三四月採苗七八月採根根類王瓜莖名赤箭明亮實者佳濕紙包於糠火中煨熟取出切片酒浸一宿焙乾用花蕊石一名花乳石害大損陰血凡虛勞吐血多由火炎迫血上行當用滋降陰火者不宜服無瘀血停積胸膈不板痛者亦忌之利酸澀氣平專入肝經血分能化瘀血為水止金瘡出血下死胎胞衣惡血化則胞胎無阻修治出陝華諸郡體堅色黃採得罐固濟頂火煅過出火毒研細水飛曬乾用青蒙石害其功消積滯墜痰涎誠為要藥然攻擊太過性復沉墜凡積滯癥結脾胃壯實者可用如虛弱者忌用小兒驚痰食積實熱初發者可用虛寒久病者忌之王隱君制滾痰丸法謂百病皆生於痰虛實寒熱概用殊為未妥不知痰有二因因於脾胃不能運化積滯生痰或多食酒面濕熱之物以致膠固稠黏咯吐難出者用之豁痰利竅除熱泄結應如桴鼓因於陰虛火炎煎熬津液凝結為痰或發熱聲啞痰血雜出者如誤服之則陰愈虛陽火反熾痰熱未退而脾胃先為敗矣前人立方不能無弊在後人善於簡擇耳利甘鹹平入肺胃大腸能平肝下氣化頑痰痞結行食積停留修治出江北諸山有青白二種以堅細青黑中有白星點者為佳用坩鍋一個以蒙石打碎入硝石等分拌勻炭火簇定煅至消盡其石色如金為度取出如無金星者不入藥研末水飛去火毒曬乾用蜈蚣害惟有毒善走竄凡小兒慢驚風口噤不語大人溫瘧非煙瘴氣所發心腹積聚非蟲結蛇瘕便毒成膿將潰咸忌用之畏蜘蛛蜒蚰雞矢桑皮戎鹽利辛溫入肝經善走能散治臍風撮口驚癇瘰癧去風殺蟲墮胎瘡疥蛇症瘴瘧修治七八月採取赤足黑頭者火炙去頭足尾甲將薄荷葉火煨用蠍害有毒此乃風藥凡似中風及小兒慢脾風病屬於虛者法咸禁之利甘辛色青屬木故治諸風眩暈驚癇搐掣口眼喎斜瘧疾風瘡耳聾帶疝厥陰風木之病修治採無時青州形緊小者良全用謂之全蠍去足焙尾名蠍稍其力尤緊水蛭一名馬蟥害有毒破瘀血之藥盡多奚必用此難制之物戒之可耳用時須煅煙出畏石灰白鹽利鹹苦平治惡血積聚能通經墮胎赤白丹腫瘰癧結核腫毒初起入竹筒中令咂病處有功修治五六月採以水中馬蟥齧人腹中有血者曝乾為佳當展其身令長腹中有子者去之性最難死雖以火炙經年得水猶活必炒枯黃入藥諸小者不堪用虻蟲害有毒專啖牛馬之血逐瘀甚疾傷寒發黃脈沉細少腹鞕如小便不利者為無血也症非蓄血不宜用若瘀未結者尤不宜用也女子月水不通由於脾胃薄弱肝血枯竭而非血結閉塞者不宜用孕婦腹中有瘕聚不宜用凡病氣血虛甚者形質瘦損非氣足之人實有蓄血者勿可妄投惡麻黃利苦寒攻血遍行經絡墮胎只在須臾色青入肝瀉血破瘀修治五月蜚蟲啖馬牛血者伺其腹滿掩取干之去翅足炒熟用豬肝害延壽書云豬臨宰絕氣歸肝不可多食必傷人餌藥人不可食合魚鱠食生癰疽合鯉魚腸子食傷人神利苦入肝諸藥中用為嚮導瀉肝明目治小兒驚癇打擊青腫炙貼作膳常食有損無益修治用時以竹刀切片穿山甲一名鯪魚害性猛善竄用宜斟酌癰疽已潰痘瘡挾虛元氣不足不能起者不宜用利鹹寒有毒專能行散通經絡達病所入肝胃二經治風濕冷痹通經下乳消腫潰癰為外科要藥修治深山大谷皆有如龜而小如鯉有足尾甲力更勝或生用或酥炙醋炙童便炙油煎土炒蛤粉炒當各隨本方制用王不留行害其性行而不住失血後崩漏家及孕婦並忌之利甘苦平入陽明衝任之經走血分通血脈利便通經催生下乳汁止金瘡癰瘍疔毒修治花如鈴鐸實如燈籠子殼五稜取苗子蒸漿水浸焙用涼肝猛將龍膽草害苦寒大損胃氣無實火者忌之雖能除實熱泄肝膽然胃虛血少者不可輕試凡病脾胃兩虛虛而有熱者皆忌服亦勿空腹服令人溺不禁以其泄太甚故也利大苦大寒沉陰下行入肝膽而瀉火兼入膀胱腎經除下焦濕熱能明目柴胡為主龍膽為使目疾要藥若目疾初起宜發散忌用寒涼治小兒客忤驚疳忌地黃赤小豆貫眾為使修治二八月十二月採得陰乾甘草湯浸一宿漉出曝乾用或酒浸炒胡黃連害性味苦寒之極設使陰血不足真精耗竭而脾陰胃氣俱弱切勿妄投須與健脾胃等藥同用乃可無弊慎之忌畏惡俱同黃連利苦寒入胃肝膽三經主虛家骨蒸初起可用久痢胃氣實可用醫小兒疳積驚癇其性味功用似黃連修治不拘時月收採折之塵出如煙者真涼肝次將羚羊角害性寒能伐生生之氣凡肝心二經有熱者宜之無火熱勿用利苦鹹瀉心肝肺邪熱下氣降火解毒散血祛風舒筋故能明目去障治驚癇搐搦亦治狂越僻謬夢魘傷寒伏熱氣逆食噎不通羚之性靈而精在角故又辟邪散瘀血而療痘瘡解諸毒也修治出西地似羊而大角有節最堅勁能碎金石明亮而不黑者良多兩角一角者更勝鎊片綿包或磨汁用入丸散須要不拆原對繩縛鐵銼銼細搗篩更研萬遍入藥免刮人腸夏枯草害久服亦傷胃家利辛苦微寒緩肝火解內熱散結氣治瘰癧鼠瘻癭瘤乳癰乳岩目珠夜痛能散厥陰之鬱火故也土瓜為使伏汞砂修治此草夏至後即枯四月採曬乾用石決明害多服令人寒中永不得食山龜令人喪目利咸涼墜肺肝風熱而明目內服療青盲內障外點散赤膜外障除目疾及肝火外他用甚稀亦治骨蒸勞熱通淋修治採無時七孔九孔者佳或煅研或生搗或鹽水煮用青蒿害苦寒之藥多與胃家不利凡產後氣虛內寒作瀉及飲食停滯泄瀉勿用產後脾胃薄弱忌與歸地同用雷公曰使子勿使葉使根勿使莖子葉根莖四件若同使翻然成痼疾利苦寒入肝膽腎治三焦清暑治骨蒸勞瘦骨間伏熱殺鬼疰傳屍苦寒之藥多與胃家不和惟青蒿芬芳襲脾宜於血虛有熱之人取其不犯中和之氣耳修治四五月採莖葉八九月採子蒿梗功用相同曬乾入藥或熬膏或蒸露菊花害苦寒之品非胃家所宜牧豎閒談云真菊延齡野菊泄人故丹溪曰野菊服之大傷胃氣是也利甘苦微寒補益金水善制風木去胸中之熱祛頭目之風白朮枸杞地骨皮桑白皮為使修治滁州菊單瓣色白味甘者為上杭州黃白茶菊微苦者次之其餘苦菊單不入藥或炒黑或煨炭或生用九月採摘曝乾野菊苦辛慘烈有小毒調中破血治癰腫疔毒連莖葉搗敷服皆效青黛害性涼中寒者勿使即陰虛有熱者亦不宜用解毒治火固其所長古方多有用於諸血證者使非血分實熱而病由於陰虛內熱陽無所附火空上炎發為吐衄咯血唾血等證用之非宜愈增其病宜詳辨之利鹹寒清肝火解鬱結治中下焦蓄蘊風熱吐血理幼稚驚疳敷熱毒惡腫染靛功同修治真者從波斯國來不可得也今用干靛花取嬌碧者每斤淘取一兩亦佳內多石灰故須淘淨蘆薈害苦寒之性脾胃虛者犯之洞泄不止故凡小兒脾胃虛弱不思食及泄瀉者禁用利大苦大寒功專清熱殺蟲涼肝明目鎮心除煩治驚癇敷䘌齒濕癬修治出波斯國狀似黑錫乃樹脂也採之不拘時月味苦色綠者真密蒙花利甘微寒潤肝燥治目中赤脈青盲雲翳音義眼疾也赤腫眵眼小兒疳氣攻眼善療眼疾外無他用也修治產蜀中樹高丈餘葉冬不凋其花繁密蒙茸故名二三月採花揀淨酒潤焙用溫肝猛將肉桂害其氣大熱偏勝陽氣表裡俱達和營氣散表邪出汗實腠理則桂枝為長故仲景以治冬月傷風寒病邪在表者肉桂桂心實一物也只去皮耳此則走里行血除寒破血平肝入右腎命門補相火不足然大忌於血崩血淋尿血陰虛吐血咯血鼻衄齒衄汗血小便因熱不利大便因熱燥結肝熱咳嗽肺熱氣不下行每上見熱症下見足冷產後去血過多產後血虛發熱小產後血虛寒熱陰虛五心煩熱似中風口眼歪斜失音不語語言蹇澀手足偏枯中暑昏暈中熱腹痛婦人陰虛少腹痛一切溫病熱頭疼口渴陽症發斑發狂小兒痧疹腹疼作瀉痘瘡血熱乾枯黑陷婦人血熱經行先期婦人陰虛內熱經閉婦人陰虛寒熱往來口苦舌乾婦人血熱經行作痛男婦陰虛內熱外寒中暑瀉利暴注如火一切滯下純血由於心經伏熱腸風下血臟毒便血陽厥似陰夢遺精滑虛陽數舉脫陰目盲等三十餘症法並忌之誤投則禍不旋踵謹察病因用舍在斷行其所明無行其所疑其慎毋嘗試也忌生蔥石脂利甘辛大熱大溫氣厚純陽入肝腎血分補命門相火之不足益陽消陰治痼冷沉寒平肝降氣引火歸元益火救元陽溫中扶脾胃通血脈下焦腹痛能除奔豚疝瘕立效宣通百藥善墮胞胎得人參甘草麥冬良修治去粗皮用或研末衝入藥煎勿令泄氣或用米糝搗和為丸先吞或用棗肉糊丸如前法吞隨症施用去肉外皮為桂心枝小氣薄者為桂枝又有一種觀賓桂今書官桂但能溫里和營桂枝害同前利甘辛而溫入肺膀胱溫經通脈發汗解肌無汗能發有汗能止亦治手足痛風脅風為手臂之引經故列於溫肝用桂枝發汗乃調其營則衛自和風邪無容遂自汗而解故用治風寒咳嗽有奇功非桂能發汗也汗多用桂枝者調和營衛則邪從汗解而汗自止非若麻黃之開腠理髮汗也肉桂在下主治下焦桂心在中主治中焦桂枝在上主治上焦修治桂之氣味最薄者為桂枝亦稱桂木或密炙用吳茱萸害陽厥似陰手足雖逆冷而口多渴喜飲水大小便閉結小便或通亦赤澀短少此火極似水內經謂諸噤鼓慄如喪神守皆屬於火是也此與桂附乾薑之類同禁忌嘔吐咳逆上氣非風寒外邪及冷痰宿水所致者不宜用腹痛屬血虛有火者不宜用小腸疝氣非驟感寒邪及初發一二次不宜用霍亂轉筋由於脾胃虛弱冒暑所致非寒濕生冷干犯腸胃者不宜用一切陰虛之症及五臟六腑有熱無寒之人法所咸忌損氣動火昏目發瘡非寒滯有濕者勿用即有寒濕者亦宜酌量少用利辛苦大熱疏肝燥脾溫中下氣除濕解鬱去痰殺蟲逐寒主厥陰頭疼嘔逆吞酸痞滿噎膈食積瀉痢血痹陰疝奔豚癥瘕治陰寒攻心痛腳氣水腫所謂衝脈為病逆氣裡急又為溫膀胱之猛將也惡丹參硝石畏紫石英蓼實為使修治九月九日採實開口陳久者良陰乾須滾湯泡去苦烈汁七次始可焙用治疝鹽水炒治血醋炒止嘔薑汁炒疏肝胃黃連木香汁炒細辛害其性升燥發散凡病內熱及火升炎上上盛下虛氣虛有汗血虛頭痛陰虛咳嗽法皆禁用即入風藥亦不可過五分服過一錢使人悶絕因其氣厚而性烈耳雙葉者服之害人惡黃耆狼毒山茱萸忌生菜畏硝石滑石反藜蘆利辛溫香燥善開竅散風寒入心肺腎三經能行心下水停宣通遊風浮熱口瘡喉痹利九竅修治二八月採根純陽切去頭子以瓜水浸一宿曝用北產華陰者細而香最佳南產者名土細辛稍大而不香又名馬辛胡椒害辛熱之物如血分有熱者與夫陰虛發熱咳嗽吐血咽乾口渴熱氣暴沖目昏口臭齒浮鼻衄腸風臟毒痔漏泄澼等症切勿輕餌誤服能令諸症即時劇作慎之世人因其快膈嗜之者眾然損肺走氣動火動血損齒昏目發瘡痔臟毒必陰氣至足者方可用利辛熱入脾胃肝大腸四經溫中下氣快膈消痰治寒痰食積蓋此藥猶如附桂使與陰虛火衰必與歸地同用則無偏勝之弊也畢澄茄即胡椒之大者修治五月採收曝乾乃皺骨碎補一名猴姜又名申姜害勿與風藥同用以其苦堅腎腎藏惡燥再加風藥溫燥反傷血液是為太過利苦溫入肝腎二經主骨碎折傷去瘀生新治腎虛泄瀉耳鳴牙痛修治冬採根以銅刀刮去黃毛細切蜜拌蒸後曬乾用急用只焙乾不蒸亦得也溫肝次將菟絲子見前補肝部艾葉害純陽香燥凡血燥生熱者禁用與炙火亦大損陰血虛者宜慎胎動不安由於熱而不由於寒妊娠下利膿血由於暑濕腸胃熱甚而非單濕為病崩中由於血虛內熱經事先期由於血熱吐衄血由於血虛火旺由於鬼擊中惡霍亂轉筋不由於寒邪而由於脾胃虛弱凝滯或於暑濕所致不孕由於血虛而不由風冷襲入子宮者法並忌用利生溫熟熱辛可利竅苦能舒通入肺脾肝腎四經氣血交理安胎氣暖子宮故婦科帶下調經多需之理血痢腸風治崩吐衄外用灸除百病陳者良醋香附為使修治三月三日五月五日採葉乾曝揉搗如綿謂之熟艾陳久者可用蘄州艾為上煎服宜鮮者生用或燒成炭入女科丸醋煮搗成餅子烘乾再搗為末用山茱萸見本臟補部茴香害其性溫燥能昏目發瘡若胃腎多火陽道數舉得熱則吐者均戒大茴香性熱功用略同利辛溫香入胃肝腎膀胱四經主腹痛疝氣平霍亂血逆得酒良修治八九月採實陰乾小如粟米者謂之小茴香力薄酒炒黃用自番舶來者實大如柏裂成八瓣一核大如豆黃褐色有仁味更甜俗呼舶茴香又曰八角茴香又名大茴香入下焦藥鹽水炒用脾部藥隊補脾猛將白朮害五臟皆陰世人但知補脾此指脾為濕土之臟術能燥濕濕去則脾健故曰補也不知脾無濕邪者用之反燥脾家津液是損脾陰也何補之有此最易誤故特表而出之凡血少精不足內熱骨蒸口乾唇燥咳嗽吐痰吐血齒衄鼻衄咽塞便秘滯下者咸宜忌之肝腎有築築動氣者勿服術性燥而閉氣劉涓子癰疽論云潰瘍忌白朮以其燥腎閉氣而反生膿作痛也利苦甘溫健脾進食消穀補中化胃中痰水理心下急滿利腰臍血結祛周身濕痹君枳實以消痞佐黃芩以安胎茯苓為使修治野朮於潛朮仙居術為勝臺產術力薄只可調理常病若生死關頭斷難恃以為治江西術與浙江野術相似苦劣不堪用陳壁土炒或人乳拌蒸糯米泔浸黃精害生用則刺人咽喉利甘平入脾補中益氣安五臟潤心肺填精髓助筋骨除風濕殺下三尸蟲似玉竹而稍大故俗呼玉竹黃精又一種似白芨俗呼白芨黃精又名山生薑則恐非真者溪水洗淨九蒸九曬用補脾次將山藥一名薯蕷害忌同麵食利甘平入脾肺腸胃四經益氣強陰治虛損勞傷心脾長肌安神清其虛熱除瀉利止遺精修治洗淨切片曬乾或炒黃用入脾胃土炒入腎鹽水炒白扁豆害多食壅氣患寒熱者不可食蓋邪瘧未盡及傷寒外邪方熾不可服此補益之物耳如脾胃虛及傷食勞倦發寒熱者不忌利甘溫補脾胃降濁升清消暑除濕止渴止瀉專治中宮之病衣清皮膚之濕熱葉利暑濕修治炒研或生用或去皮炒時珍曰凡用取硬殼扁豆子連皮炒熟入藥薏苡仁一名米仁害此除濕燥脾之藥凡病人大便燥結小水短少因寒轉筋脾虛無濕者忌妊婦禁用利甘淡微寒入胃土勝水淡滲濕瀉水故能健脾腳氣疝氣泄痢熱淋益土所以生金故補肺清熱治肺癰肺痿咳吐膿血等症修治凡使每一兩以糯米一兩同炒熟去糯米用亦有更以鹽湯煮過者或炒或生用大棗害雖能補中而益氣然味過於甘甘令人滿脾必病也故中滿勿服凡風痰痰熱及齒痛俱非所宜小兒疳病亦禁生者尤為不利多食致寒熱熱渴膨脹動臟腑損脾元助濕熱凡形羸瘦者不可食殺烏附毒忌蔥魚同食利甘平調中益氣滋脾土潤心肺和營衛緩陰血生津液悅顏色和百藥紅棗功用相仿差不及爾修治擘去核用青州棗核細形大多膏甚甜特佳曬晉州棗肥大甘美次之頻食生蟲損齒貽害多矣紅棗益脾胃余者止可充食入和解藥薑汁炒香入醒胃藥但去核炒香糊丸藥蒸透乘熱去皮核搗爛甘草害甘令人中滿有濕之人若誤用之令成腫脹故凡諸濕腫滿脹病及嘔家酒家咸不宜服利甘平入心肺脾胃生用氣平補脾胃不足而瀉心火炙用氣溫補三焦元氣若入和劑則補益入汗劑則解肌入涼劑則瀉邪熱入峻劑則緩正氣姜附加之恐其潛上硝黃加之恐其峻下皆緩之之意稍止莖中作痛節醫毒腫諸瘡修治以大徑寸而結緊斷文者為佳謂之粉草細者名統草補中炙用宜大者瀉火生用宜細者白朮苦參乾漆為使惡遠志反大戟芫花甘遂海藻然亦有並用者胡洽治痰癖十棗湯加甘草東垣治結核與海藻同用丹溪治勞瘵與芫花同行非妙達精微者不能知此理也余疑遠志與甘草相惡必誤載以遠志用甘草水浸用可知枳實害惟專消導破氣損真丹溪云瀉痰有沖牆倒壁之力其為勇悍之氣可知凡中氣虛弱勞倦傷脾發為痞滿者法當調中益氣則食自化痞自消若再用此破氣是速其斃也脹滿非實邪結於中下焦手不可按七八日不更衣者必不可用挾熱下利亦非燥糞留結者必不可用傷食停積多因脾胃虛不能運化所致慎勿妄投如元氣壯實有積滯者不得已用一二劑病已即去之若不識病之虛實一概施用損人真氣為厲不淺誤投雖多服參耆補劑亦難挽其克削之害也故特表以為戒孕婦尤忌利苦酸微寒入肺脾胃肝大腸五經破積有雷厲風行之勢瀉痰有推牆倒壁之威解傷寒結胸除心下急痞按枳實枳殼性效不同修治皮厚而小者為枳實完大者為枳殼皆以翻肚如盆口狀陳者為良採破除核微炙令乾切片小麥麩炒焦去麩用萊菔子害萊菔惟專下氣復能耗血久食澀營衛白人鬚髮服地黃首烏者不可食子消痰下氣更速凡虛弱者服之氣難布息利辛溫入肺脾胃長於利氣炒熟下氣定喘消食除膨生研堪吐風痰醋調能消腫毒治痰之功有以沖牆倒壁為喻者誤服參耆此能消之萊菔辛甘平生食宣氣熟食降氣寬中消食化痰散瘀葉亦稱菜辛苦溫功用略同亦甚消伐檐上過冬經霜者治喉痹黃疸有神功煙薰垂死嚼汁嚥下修治煮食過多停滯成溢飲生則噫氣熟則泄氣多食滲人血白鬚發非獨因其下氣澀營衛也瀉脾次將六神麯害辛溫燥烈之品凡脾陰虛胃火盛者不宜用能落胎孕婦不宜用近今藥肆中多酒藥曲其性酷烈傷人臟腑斷不可服利甘平溫入脾胃二經健脾消穀食停腹痛無虞下氣行痰泄利反胃有藉亦能損胎修治六月六日五月五日以白曲百斤青蒿蒼耳野蓼各取自然汁三升杏仁泥赤小豆末各三升以配青龍白虎朱雀玄武勾陳騰蛇六神通和作餅麻葉或楮葉包裹如造醬黃蒸法待生黃衣曬乾收之陳久者良研細炒黃建神麯力勝出福建泉州範志吳一飛所造百草曲每塊重不過兩曲中大麥囫圇不碎劈取咬之口中覺清香者真炒研末服如其麥粒淡無氣味者偽品也近今各地用酒麴入諸藥草及毒藥造成其性酷烈斷不可用麥芽害有積消積無積消人元氣墮胎利甘鹹溫入脾胃二經熟腐五穀消導而無停運行三焦宣通而不滯快脾寬腸和中下氣散結祛痰尤善通乳亦催生而墜胎修治今以大麥發芽炒焦用古方麥芽實穬麥為芽耳山查害性能克伐化飲食若胃家無食積及脾虛不能運化不思食者服之反致克伐脾胃生髮之氣令人嘈煩易飢如脾胃虛兼有積滯者當以補氣藥同施亦不宜過用也物類相感志云煮老雞硬肉入山查數顆即易爛其消食克伐之力則愈彰矣凡服人參不相宜者服山查即解一補氣一破氣也又能損齒齒齲人尤不宜也利酸甘微溫入脾胃二經健脾行氣消食磨積化痰散瘀善去肉食腥膻油膩之積與麥芽之消穀積者不同佐以茴香治疝氣砂糖調服治兒枕痛發小兒痘疹行乳食停留炒成炭則健脾消食之功良而酸收之性減修治九月霜降後取熟者去核曬乾炒用枳殼害泄肺走大腸而能損至高之氣肺氣虛弱者忌之脾胃虛中宮不運而痰壅喘急者忌之咳嗽不因於風寒入肺而氣壅者服之反能增劇咳嗽由陰虛火炎者服之立致危殆利苦微寒入肺脾胃肝大腸五經破至高之氣除咳逆停痰助傳導之官消水留脹滿兼能清膀胱枳實性急枳殼性緩俱可磨汁用而力更迅修治去瓤切片麩皮炒用大腹皮害性與檳榔相似病人稍涉虛者概不可用利辛微溫泄脾下氣寬胸行水通大小腸治水腫腳氣痞脹痰膈瘴瘧修治去子洗淨如絨用其子近今肆中偽充檳榔入藥孫思邈曰鴆鳥多棲檳榔樹上凡用檳榔大腹子皮宜先以酒洗以大豆汁再洗過曬乾入灰火燒煨切用厚朴害辛溫大熱性專消導散而不收脫人元氣略無補益之功故凡嘔吐不因寒痰冷積而由於胃虛火氣炎上腹痛因於血虛脾陰不足而非停滯所致泄瀉因於火熱暴注而非積寒傷冷腹滿因於中氣不足氣不歸元而非氣實壅滯中風由於陰虛火炎猝致僵仆而非西北真中風寒邪傷寒發熱頭痛而無痞寒脹滿之候小兒吐瀉乳食將成慢驚大人氣虛血槁延為膈症老人脾虛不能運化偶有停積娠婦惡阻水穀不入娠婦胎氣升眩暈娠婦傷食停冷娠婦腹痛瀉痢娠婦傷寒傷風產後血虛腹痛產後中滿作喘產後泄瀉反胃以上諸症法所咸忌若誤投之輕病變重重病必危不究其源一概濫用雖一時未見其害而清純沖和之氣默為之耗娠婦服之大損胎元可不慎哉惡硝石澤瀉忌豆利苦降能瀉實滿辛溫能散濕滿入脾胃二經平胃氣調中消痰化食行結水破宿血散風寒調胸腹而止痛殺臟蟲治反胃嘔逆喘咳瀉利冷痛共主乃結者散之之藥也乾薑為使修治七八月採之味甘美取皮陰乾薑汁炒刮去粗皮用生薑汁炒炙或浸炒用味苦不以薑製則棘喉舌梓州龍州者為上皮極鱗皺而紫色多潤味辛者佳薄而白者不堪入藥使君子害無蟲積者勿食凡小兒泄瀉是暑氣所傷者禁與肉果訶子等澀熱藥同用服使君子後亦忌食熱物熱茶犯之即作泄瀉利甘溫入脾胃二經殺蟲消積治五疳便濁瀉痢澼瘡為小兒科要藥修治出嶺南州郡七月採子殼生用或蒸熟食或以殼煎湯嚥下或云七生七煨合服白芷害燥能耗血散能損氣有虛火者忌凡嘔吐因於火者禁用漏下赤白由陰虛火熾血熱所致者勿用癰疽已潰宜漸減利辛溫入肺脾大腸三經通竅發汗除濕散風皮膚燥癢風熱為病及血崩血閉腸風痔瘻濕熱為病尤治頭風齒痛目淚眉疼宜之修治二八月採根曝乾以黃澤者為佳洗刮寸截以石灰拌勻曬收為其易蛀並欲色白入藥微焙切片用勿用四條一處生者名喪公藤又勿用馬蘭根雞內金害同麥芽利甘平性澀入脾去煩熱消水穀通大小腸治遺溺便數修治剖取不可落水去宿食瓦上炙入藥男用雌女用雄橘皮害氣味辛溫能耗真氣凡中氣虛氣不歸元忌與耗氣藥同用胃虛有火嘔吐不宜與溫熱香燥藥同用陰虛咳嗽生痰不宜與半夏南星等同用化州陳皮消伐太峻不宜濫用利苦辛溫入肺脾胃三經止嗽定嘔清痰理氣和中妙品留白補胃偏宜去白疏通專掌化州陳皮苦能泄氣又能燥濕辛能散氣溫能和氣同補氣藥則補同瀉藥則瀉同升藥則升同降藥則降橘絡辛溫宣氣通絡治絡用為引經酒炒用橘紅以皮行皮兼能治表寒橘皮性溫柑柚皮性冷修治廣東新會皮為勝陳久者良故名陳皮福建產者名建皮力薄浙江衢州出者名衢皮更次矣去白名橘紅痰嗽童便浸曬痰積薑汁拌入下焦鹽水炒濟和蜜炙去紅曰橘白疏通滯氣鹽水炒用化州陳皮消痰甚靈真者絕少無非柚皮而已橘皮下氣行痰橘肉生痰聚氣一物也而相反如此橘皮紋細色紅而薄內多筋絡其味苦辛柑皮紋粗色黃而厚內多白膜其味辛甘柚皮最厚而虛紋更粗色黃內多膜無筋其味甘多辛少但以此別之則不差矣柑皮猶可用柚皮則懸絕矣檳榔害能墜諸氣至於下極氣虛下陷者所當遠避如脾胃虛雖有積滯者不宜用下利非後重者不宜用心腹痛無留結及非蟲積者勿用瘧非山嵐瘴氣者不宜用凡病屬陰陽兩虛中氣不足而非腸胃壅滯宿食脹滿者悉在所忌多食亦發熱嶺南多瘴以檳榔代茶損泄真氣所以居人多病少壽利苦辛溫入脾胃大腸三經降至高之氣疏後重之急攻痰癖去腫脹消食積而治瘧療腳氣而殺蟲辛能破氣苦能殺蟲修治浸透切片近時方藥亦有以火煨焙用然出生白檳榔須本境可得若他處者必經煮薰安得生者耶涼脾猛將大黃害經曰實則瀉之此大苦大寒峻利之性猛烈之氣長驅直搗一往直前苟非血分熱結六脈沉實者切勿輕與推蕩大黃乃血分之藥病在氣分及胃寒血虛並胎產而用之者是為誅伐無過矣凡病血閉由於血枯而不由於熱積寒熱由於陰虛而不由於血積癥瘕由於脾胃虛弱而不由於積滯停留便秘由於血瘀血燥腸燥而不由於飲食停滯女子少腹痛由於厥陰血虛而不由於經阻老血瘀結滯下者不宜用初起即屬胃虛當以補養胃氣清消濕熱為本而不可妄加推蕩當謹慎分別若輕發誤投損傷胃氣多至危殆戒之戒之利大苦大寒入脾胃心肝大腸五經瀉有形積滯水食痰結者宜之有撥亂反正之功得峻快將軍之名清血分實熱血瘀血逆者宜之仲聖瀉心湯治心氣不足而吐衄乃心氣不足而包絡肝膽與胃之邪火有餘雖曰瀉心實瀉經血中伏火也又心下痞滿按之濡者用大黃黃連瀉心湯亦瀉脾胃濕熱非瀉心也病發於陰下之則痞滿乃寒傷營血邪氣乘虛結於上焦胃之上脘當心故曰瀉心實瀉胃也病發於陽下之則結胸乃熱邪陷入血分亦在上脘大陷胸湯丸皆用大黃亦瀉脾胃血分之邪若結胸在氣分只用小陷胸湯痞滿在氣分只用半夏瀉心湯修治川產如錦紋者良洗切片浸取汁衝入藥制用酒浸或酒拌蒸則性緩而能上行邪熱之在上者借酒行之以成勳也生熟之力不同生用更峻欲取通利者不得驟進穀食大黃得穀食不能通利也黃芩害凡苦寒性燥功能除熱而非補益之品但無濕者如脾肺虛熱及中寒作泄中寒腹痛肝腎虛水腫血枯經閉肺受寒邪喘嗽及血虛胎不安陰虛淋漏皆忌胎前若非實熱而服之因損胎元矣利苦寒中虛而大者曰枯芩瀉肺火清肌表之熱並理目赤疔癰堅實而細者曰條芩即子芩瀉大腸火治澼痢腹痛兼可安胎亦治上焦風熱濕熱利水二芩俱兼入脾經苦能燥濕泄熱下氣也輕飄者上行堅重者下降不可不別也柴胡退熱不及黃芩柴胡苦以發之散火之標黃芩寒以勝熱折火之本若飲食受寒腹中痛及飲水心下悸小便不利而脈不數者是里無熱也修治得酒炒則上行得豬肝汁炒除肝膽火得柴胡退寒熱得芍藥治下痢得桑白皮瀉肺火皆取苦寒瀉有餘之邪栝蔞見肝部瀉將涼脾次將川黃柏害固能除熱益陰然陰陽兩虛之人病兼脾胃薄弱飲食少進及食不消或兼泄瀉或嘔惡冷物及好熱食腎虛天明作瀉上熱下寒小便不禁少腹冷痛子宮寒冷血虛不孕陽虛發熱瘀血停滯產後血虛發熱金瘡發熱癰疽潰後發熱傷食發熱陰虛小水不利痘後脾虛小水不利血虛不得眠血虛煩躁脾陽不足作泄等症法並忌服必尺脈洪大按之有力方用之苦虛火誤服有寒中之變利苦寒入脾腎膀胱大腸四經統涼三焦瀉龍火而救水利膀胱之濕熱佐以蒼朮理足膝之痹痛漬以蜜水嗽口舌之生瘡修治川產肉厚色深者良生用降實火炒黑止崩帶酒製治上蜜制治中蜜炙庶不傷胃鹽制治下山梔子見心部瀉將知母害傷胃滑腸令人作瀉凡陽痿及易舉易泄脾弱飲食不消化胃虛不思食腎虛溏泄等症法並禁用士材云苦寒肅殺非長養萬物者也世以其滋陰用治虛損則如水益深矣利辛苦寒滑清肺熱瀉腎火之有餘入二經氣分潤腎燥滋陰消痰定嗽止渴除煩兼能安胎利二便消腫為涼脾胃大腸之品知母須其根也力薄而苦寒性減修治二八月採根凡用揀肥潤里白者去毛切得酒良上行酒浸焙乾下行鹽水拌焙忌鐵淨銀花害其氣寒涼凡虛寒體及脾胃薄弱者勿服恐有寒中腹痛便溏泄瀉之患癰疽潰後宜少用經謂寒則血澀不易收斂也利甘平入脾肺解熱化毒療風養血除利寬膨淨銀花性加涼而解熱化毒之力更勝忍冬藤甘寒無毒祛風解毒而舒筋結修治四月採花陰乾不拘時採藤乾者不及生者力速釀酒代茶熬膏並妙蒸露尤佳武夷茶害寒胃消脂酒後飲茶引入膀胱腎經能令人腰腳膀胱冷痛患瘕疝水腫拘攣空心尤忌多食發黃消瘦使人不睡多成飲症利苦甘微寒入心肺脾三經下氣消食去痰熱除煩渴清頭目利小便解炙爆油膩之毒消痔漏等瘡武夷茶消食偏長飲之宜熱冷則聚痰與榧肉同食令人身重修治三四月採焙乾芽尖入藥溫脾猛將製附子害大熱純陽其性浮多沉少若內真熱而外假寒陰虛內熱血液衰少傷寒溫疫熱霍亂陽厥等症投之靡不立斃謹列其害於後醫師令命宜深鑿之亦人之大幸也凡病人一見內熱口燥咽乾口渴渴欲引飲咳嗽痰多煩燥五心煩熱惡寒陰虛內熱外寒虛火上攻齒痛脾陰不足以致飲食無味小便黃赤短澀及不利大便不通或燥結腹內覺熱悶喜飲冷漿及鮮果畏火及日光兼畏人聲及木聲及虛陽易興夢泄不止產後發熱產後血行不止及惡瘡臭穢小產憎寒壯熱中暑厥暈陰虛頭暈中暑暴泄利下如火赤白帶下小兒中暑傷食作泄小便短赤口渴思飲血虛腹痛按之即止火炎欲嘔外類反胃而惡熱焦煩得寒暫止中熱腹中絞痛中暑霍亂吐瀉或乾霍亂或久瘧寒熱並盛或赤白濁赤白淋尿血便血血崩吐衄齒衄舌上出血目昏神短耳鳴盜汗汗血多汗惡熱老人精絕陽痿少年縱欲傷精以致陰精失守婦人血枯無子血枯經閉腎虛小便餘瀝血虛大便燥結陰虛口苦舌乾心經有熱夢寐紛紜下部濕熱行履重滯濕熱痿痹濕熱作瀉濕熱腳氣小兒急驚內熱痘瘡乾焦黑陷痘瘡火閉不出痘瘡皮薄嬌紅痘瘡因熱咬牙痘瘡挾熱下利痘瘡餘毒生癰中風僵仆不語口眼歪斜語言蹇澀半身不遂中風痰多神昏一切癰疽未潰金瘡失血發痙血虛頭痛偏頭風痛以上男女內外小兒約數十症屬陰虛及諸火熱無關陽弱亦非陰寒法所均忌倘誤犯之輕變為重重者必死臨症施治宜謹審之世徒見其投之陽虛之侯服之功效甚捷而不知其用之陰虛如上諸病亦復下咽莫救枉害人命可不慎諸好古云用附子以補火必防涸水若陰虛之人久服補陽之藥則虛陽易熾真陰愈耗精血日枯而氣無所附麗遂成不救者多利甘辛熱入脾腎通行諸經補元陽益氣力堅筋骨治心腹冷痛寒濕痿躄足膝癱瘓堅瘕症積能墜胎熱而善走益火之源以消陰翳稟雄壯之質有斬關之能引補氣藥以追散失之元陽引補血藥以養不足之真陰引發散藥以驅在表之風寒引溫運藥以逐在裡之冷濕退陰益陽祛寒濕之要藥也生附子毒緊功烈附子尖宣吐風痰其性銳達制川烏性稍緩於附子生川烏毒緊功烈制天雄辛熱入肺腎二經除寒濕痿躄強陽壯筋骨生用則發散熟用則峻補生用須如陰制之法去皮臍入藥修治十一月播種春苗生九月採根者乃佳初種之小者為烏頭附烏頭旁而生為附子又左右附而偶生者為鬲子附而長者為天雄陽而尖者為天錐附附而上出者為側子附而散生者為漏藍子皆脈絡連貫如子附母而附子以貴故專附名也川產為勝土人以鹽醃之則減其性陝西出者名西附體堅而外皮光潔四川出者名川附體松而外皮多細塊以皮黑體圓底平八角頂大者良煎甘草湯浸令透然後切片慢火炒黃而干放泥地上出火毒有用水浸麵裹煨令發折則雖熟而毒仍未去非法之善者有用黑豆煮者有用甘草鹽水薑汁童便煮者恐煮之氣味煎出其力尤薄且制之不過欲去其毒性耳若用童便是反抑其陽剛之性矣尤非法之善者惟用甘草湯泡浸則毒解而力不減尤為盡善矣市醫淡漂用之是徒用附子之名爾乾薑害性大辛辛能僭上亦能散氣動血損陰傷目凡陰虛內熱咳嗽吐血表虛有熱汗出自汗盜汗臟毒痛漏下血因熱嘔惡火熱腹痛法並忌用孕婦尤忌癰疽人多食則生惡肉突出八九月多食姜至春多患眼損壽減筋力又云秋不食姜令人瀉氣利辛熱宣肺氣燥脾濕溫經逐寒開胃扶脾消食去滯理翻胃腹痛具消痰破血之功除積脹瘕症有下氣溫中之效炮姜乾薑本辛泡之則苦大熱大燥守而不移非若附子行而不守也除胃冷祛寒濕能去臟腑沉寒痼冷能止血所謂止血者血虛則熱熱則妄行炒黑則能引補血藥入陰分血得補則陰生熱退此陽生陰長之義且黑為水色故血不妄行也能去惡血生新血血寒者多用血熱者宜少用不過三四分為嚮導而已引附子則入腎能通脈回陽多用則耗散元氣生則逐寒邪而發表炮則除胃冷而守中修治九月採母姜曬乾姜白淨結實者良如懼其散炒黃用或炒微黑市醫將乾薑泡淡用之殊屬可笑乾薑炮黑為炮姜一名黑姜巴豆霜害元素曰巴豆乃斬關奪門之將不可濫用鬱滯雖開真陰隨損從正曰傷寒風濕痘瘡產後用之下膈不死亦危觀二公之言則巴豆之為害可畏也此稟火烈之氣觸人肌膚無有不灼爛試以少許輕擦完好之肌須臾即發出一泡況腸胃柔脆之質下咽徐徐而走無論下後耗真陰及臟腑被其熏灼能免潰爛之患耶凡一切湯劑丸散切勿妄投即不得已急症欲借其開通道路之力亦須炒熟壓令油極淨入少許中病即止利辛熱入肺脾胃大小腸五經蕩五臟滌六腑幾於煎腸刮胃攻堅積破痰癖真可斬關奪門氣血與食一攻而殆盡痰蟲及水傾倒而無遺立墜胎兒善拔疔毒修治八月採陰乾去心皮此物不去膜則傷胃不去心則作嘔或用殼用仁用油生用炒用醋炙燒存性用壓去油名巴豆霜如去心去膜油生用炒用為急治水穀道路之劑炒去煙令紫黑用為緩治消堅磨積可以止瀉也肉豆蔻害香燥偏陽大腸素有火熱及中暑熱泄暴注腸風下血胃火齒痛及溫熱積滯方盛瀉利初起皆不宜服多服則泄氣利辛溫入肺脾胃大腸四經功專溫中亦能下氣脾得補而善運氣自下也又能澀大腸止虛瀉冷痢修治六七月採出嶺南似草蔻外有縐紋內有斑紋糯米粉裹或麵煨熟須去油淨忌鐵草果害辛熱破氣若瘧不由於嵐瘴氣不實邪不盛者並忌市醫不審病源用以截痰瘧則成氣虛膨脹者比比矣利辛溫入脾胃二經破瘴厲之瘧消痰食之愆氣猛而濁用宜慎之修治形如訶子皮黑厚而稜密子粗而辛臭麵裹煨熟取仁用忌鐵草豆蔻害辛燥犯血陰不足者遠之凡瘧不由瘴氣心胃痛由於火而不由於寒泄瀉暴注口渴而由於暑氣濕熱法咸忌之利辛溫入肺脾胃三經散寒止心腹痛下氣驅逆滿之疴開胃而理霍亂吐瀉攻堅而破噎膈癥瘕辛能破滯香能達脾溫能散寒修治形如龍眼而微長皮黃白薄而稜峭仁辛香氣和去膜微炒用滇廣所產名草果閩產名草豆蔻也氣異而功用亦別矣蒼朮害辛溫燥烈大便燥結多汗者忌用余與白朮禁例同利苦辛溫入脾胃二經燥濕消痰發汗解鬱除山嵐瘴氣弭災沴惡疾修治出茅山堅小有硃砂點者良糯米泔浸焙乾同芝麻炒以制其燥本草經不分蒼白陶隱居分兩種施用胡椒見肝部溫脾次將木香見肝部煨姜害見前乾薑條利辛溫燥散未甚止嘔和中溫脾胃最平安並棗用宜煨姜修治取生薑洗淨用粗紙包裹浸濕入火灰中煨熟切片入藥烏藥害辛溫散氣之品病屬氣血虛而內熱者忌之時醫多以香附同用治女子一切氣病然有虛實寒熱冷氣暴氣用之固宜虛氣熱氣用之貽害故婦人月事先期小便短赤及咳嗽內熱口渴口乾舌苦不得眠一切陰虛內熱之病皆不宜服利入肺脾胃膀胱通溫三焦辛溫芳馥下氣溫中治膀胱冷氣攻衝胸腹積停為痛天行疫瘴鬼犯蟲傷修治八月採根有車轂紋形如連珠天台者香白不及南海之力大酒浸一宿炒亦有煅研用者藿香害芳烈升陽雖能止嘔治吐逆若胃熱作嘔法並禁用中焦火盛及陰虛火旺溫病熱病陽明胃家邪實作嘔作脹並禁利辛微溫溫中開胃行氣止嘔稟清和芳烈之氣治心腹絞痛霍亂吐瀉為脾肺達氣要藥梗達氣為長而芳烈遜之修治出交廣方莖有節葉微似茄葉古惟用葉今枝梗亦用因葉多偽也六七月採曬乾乃芬香益智仁害其氣芳香惟性本燥熱病屬血燥有熱而崩帶遺濁者皆當忌之凡嘔吐由於熱而不因於寒氣逆由於怒而不由於虛小便餘瀝由於水涸精虧內熱而不由於腎氣虛寒泄瀉由於濕火暴注而不由於氣虛腸滑法並忌用利補腎扶脾胃溫中進飲食攝涎唾縮小便安心神止遺濁辛能開散使鬱結宣通行陽退陰之藥也修治出嶺南形如棗核取仁鹽水炒五六月熟其子如筆頭兩頭尖長七八分砂仁害辛竄性燥血虛火炎者勿用胎婦多服耗氣必致難產凡腹痛屬火泄瀉得之暑熱胎動由於血熱滯下由於濕熱上氣咳逆由於火沖迫肺而不由於寒氣所滯皆須詳察鑑別誤則有損無益宜慎之利芳香歸脾辛能潤腎下氣化食治心疼欲嘔開脾胃要藥和中氣正品若腎氣不歸元非此嚮導不濟胎喜疏利故主之陽春砂仁即縮砂仁其性同而長於開胃砂仁殼力緩修治出嶺南七八月採炒去衣研入藥白蔻仁害辛熱燥烈流行三焦凡嘔吐不因於寒及陽虛者皆不得入如火升作嘔因熱腹痛氣虛諸症法咸忌用利辛溫入脾胃通溫三焦寬中氣滯溫中除吐逆開胃消飲食治瘧症除目翳蔻殼力稍遜修治番舶來者良去衣微焙研細用米穀甘平得天地中和之氣平和五臟補益氣血除煩清熱利便止渴是無害於病症惟患霍亂之後忌粥及米飯有早中晚者得金氣多性涼尤能清熱北粳涼南粳溫赤粳熱白粳涼新粳熱陳粳涼秈糯溫陳廩平除霍亂症外余皆有益於人而無損也焦穀芽甘溫消食與麥芽同功而性不損元溫中偏長為消食建脾開胃和中之要藥生穀芽長於開胃蜀椒害純陽之氣雖除寒濕散風邪然肺胃素有火熱或咳嗽生痰或大腸積熱下血咸不宜用凡泄瀉由於火熱暴注而非積寒虛冷者忌之陰痿腳弱由於精血耗竭而非命門火衰虛冷所致者不宜入下焦藥用一切陰虛陽盛火熱衝上頭目腫痛齒浮口瘡衄血耳聾咽痛舌赤消渴肺痿咳嗽咯血吐血等症法所咸忌陰虛火旺之人在所大忌詵曰五月食椒損氣傷心令人多忘別錄曰大熱多食令人乏氣喘促閉口椒有毒能殺人利辛熱入脾肺右腎命門溫脾胃而擊三焦之冷滯補元陽而蕩六腑之沉寒燥濕發汗消食除脹治腎氣上逆能導火歸元止嘔吐瀉利消痰飲水腫通血脈而消痿痹行肢節而健機關破癥瘕安蛔蟲蟲聞椒即伏椒稟純陽之性乃除寒濕散風邪溫脾胃暖命門之要藥椒目苦辛少毒善消水脹腫滿定喘可塞耳聾塞耳聾者通關補腎之功也修治蜀產肉厚皮皺為川椒比秦椒略小去目及閉口者微炒去汗搗去裡面黃殼取紅用名椒紅得鹽良中其毒者用涼水麻仁漿解之秦椒俗名花椒比川椒味短紋低禁忌俱同川椒肺部藥隊補肺猛將黃耆害按黃耆極滯胃口胸胃不寬腸胃有積滯者勿用實表有表邪及表旺者勿用助氣氣實者勿用病人多怒則肝氣不和勿服能補陽陽盛陰虛上焦熱甚下焦虛寒者均忌恐升氣於表而里愈虛耳痘瘡血分熱者禁用利甘微溫補脾胃三焦而實肺生用固表斂汗熟用益氣補中修治八月採根陰乾達表生用或酒炒補氣水炙捶扁以蜜水塗炙數次以熟為度亦有以鹽水湯潤透熟切用產山西沁州綿上者溫補陝西同州白水耆涼補味甘柔軟如綿能令人肥今人多以苜蓿根假作黃耆折皮亦似綿頗能亂真但堅而脆俗呼土黃耆能令人瘦用者宜審丹溪云肥白而多汗者為宜若面黑形實而瘦者服之令胸滿人參害助氣閉氣屬陽陽旺則陰愈消凡酒色過度損傷肺胃真陰陰虛火動肺有火熱咳嗽吐痰吐血衄血齒衄內熱骨蒸勞瘵均在禁例實表表有邪者傷寒始作形症未定而邪熱方熾痧痘斑毒初發欲出但悶熱而不見點者若誤投之以截阻其路皆實實之害非藥可解經云實實虛虛損不足補有餘如是者醫殺之耳可不慎哉利甘溫微苦大補肺中元氣其性主氣凡臟腑之氣虛者皆能補之生津除煩聰明耳目安精神定魂魄止驚悸通血脈氣壯而胃自開氣和而食自化參條一名小參條參味性同而力薄補氣生津橫行手臂指臂無力者服之有效參鬚力更薄於參條參蘆性宣湧吐亦有補性太子參即孩兒參功媲大參高麗參功仿大參性稍寒東洋參功同大參其性溫以種硫黃故也苦參苦寒損氣敗血性與參反服之有害今人用以代茶葉暗受其損修治得火薰則軟或飯鍋內蒸軟乘熱軟時用銅刀切片連湯燉透衝入諸煎劑湯和服獨參湯加入陳皮數分或佛手柑玫瑰花之類亦可用燉湯服則不滯氣也按秋冬採者堅實春夏採者虛軟治勞金汁拌浸或用淡秋石拌入藥入參惟納新器中與細辛相間收之密封可經年不壞補肺次將潞黨參害同人參利甘平補中氣和脾胃補肺益氣升津微虛者宜之修治八月上旬採根竹刀刮曝乾勿令見風上黨即今潞州所出者良西洋參害其性苦寒臟寒者服之反作腹痛鬱火服之火不透發反生寒熱北沙參害臟腑無實熱寒客肺中作嗽者犯之成劫利苦微寒人參甘溫體重專益肺氣補陽而生陰沙參甘寒體輕專清肺熱補陰而制陽南沙參功同北沙參而力稍遜修治八九月採根白實長大者良南參色稍黃形稍瘦小而短近因有一種味帶辣者不可用產亳州百合害善通二便中寒下陷者勿服利甘微寒保肺止咳清心安精又補大腸肺與大腸相表裡也修治一莖直上四向生葉似短竹葉而闊莖端五六月開大白花者佳五月開紅花者名山丹其根微苦食之不甚良是不及白花也山丹者主治瘡腫驚邪女人崩中二月八月採根陰乾近道山谷處處有之燕窩害海味多寒寒哮冷嗽不宜用食之恐增病利甘淡平潤大養肺陰化痰止嗽補而能清治肺氣不能清肅下行之症又能開胃氣已勞痢可入煎或單煎汁服若以煮粥或雞汁煮則亂其清氣補陰之本性矣用冰糖煎則甘溫矣能助肺氣清肅下行也燕窩腳又名燕窩根色紅紫名血燕功用相仿性重能達下微咸能潤下治噎膈甚效修治閩漳海邊近生番處燕銜小魚黏之於石久而成窩又云燕銜麒麟菜嫩芽成窩有烏白紅三色烏色最下紅色最難得能益小兒痘疹白色能愈痰疾色如糙米者最佳入煎藥須用陳久者良先用清水浸透胖開用小鉗拑去毛潔淨更換清水養好仍將原燕浸水澄清去腳煎服如用毛燕窩須入石灰壇內收燥研細在風口篩簸則毛吹淨再用鉗揀去毛管如粉則煎服如用毛燕燕根燕屑入煎須用棉包或絹包好入煎則無毛恐毛不淨礙肺為患假燕窩無邊無毛色白或微有邊毛甚有白如銀絲者皆偽為之阿膠害膠性黏膩胃弱作嘔吐者勿服脾虛食不消者亦忌之利甘鹹平清肺養肝滋腎補陰止血去瘀除風化痰驢皮主風善理風淫取其烏色屬水以制熱則息風之義潤燥定喘利大小腸調經安胎又兼治利傷暑伏熱成痢者必用妊娠血痢尤宜大抵補血與液為肺大腸要藥烏驢皮膠功用略同黃明膠即牛皮膠甘平補陰潤燥活血功同阿膠可以權代補虛用牛皮膠去風用驢皮膠同蔥白煮服可通大腸癰疽初起酒燉分服四兩則毒不內攻修治山東東阿縣東北六十里有阿井自十月至二三月收取烏驢皮用狼溪河純陽水浸四五日透去毛洗刮潔淨入銅鍋內用阿井至陰之水熬煮時時攪之恆添水至極爛提去浮面渣穢待極清熬成膏對光明透照如琥珀色或光如壁漆黑色氣味清香並無皮臭臊氣夏月亦不溫軟陳者良此真阿膠也驢皮膠取烏驢皮浸消熬膠黃明膠用黃牛皮浸消熬膏其氣濁臭而不清香今市中膠物製作不精故不堪用今方法用麵炒成珠化痰蛤粉炒止血蒲黃炒或童便和化以解其氣如真阿膠得趨下至靜之性凡血熱則沸郁妄行諸見血症遇此即止故用水溶化為佳炒珠恐亂其性也井乃濟水所注取井水煮膠用攪濁水則清故人服之下膈疏痰止嘔蓋濟水清而重其性趨下故治瘀濁及上逆之痰也懷山藥見脾部訶子害苦澀性溫卻又泄氣病人氣虛咳痢初起者勿服凡咳嗽因於肺經實熱泄瀉因於濕熱所致氣喘因於火逆衝上帶下因於虛熱而不因於虛寒及腸澼初發濕熱正盛小便不禁因於腎家虛火法並忌之至於帶下本於濕熱喘嗽實由肺火用之立致殺人宜當深戒其弊利酸澀苦溫斂肺金而止咳喘固大腸而已泄利利咽喉而通津液下食積而除滿膨修治嶺南皆有而廣州最盛七八月採子六稜者佳波斯舶上來者六稜黑色肉厚者良酒浸後蒸一伏時刀削去皮肉銼焙用用核則去肉生用清金煨熟固腸麥冬見心部冰糖害甘能滿中中滿者勿服多食助熱損齒生長蟲發疳䘌如出斑疹誤食膩膈壅氣毒不能出遂致氣逆悶迷沙糖與鯽魚同食則成疳蟲與葵子同食生流澼與筍同食不消成症身重不能行今醫家用作湯下小兒丸散殊為未當赤糖其性較白糖更溫生胃火助濕損齒生蟲多食令人心痛利白沙糖甘溫蔗寒糖經煎煉則變溫補脾緩肝潤肺和中消痰治嗽凝結作餅塊如石者為石蜜輕白如霜者為糖霜堅白如冰者為冰糖赤砂糖功用相仿和中獨長甘蔗汁甘寒和中而下逆氣助脾而利大腸亦能除熱消渴治噎膈酒毒稍通小便瀉肺猛將葶藶害雖為瀉肺利小便治腫滿之要藥然味苦大寒性峻走而不守泄肺而易傷胃不宜於脾胃虛弱及真陰不足者凡腫滿由於脾虛不能制水水氣氾濫小便不通由於膀胱虛無氣化者法所咸忌犯之輕病重重病危須慎之敷頭瘡藥氣入腦殺人有甜苦二種苦者力峻甜者稍緩更宜大棗輔之氣虛人誤服之禍不旋踵利苦辛寒入肺心脾膀胱四經疏肺下氣消痰平喘而理脹通經利水修治立夏後採實陰乾以糯米相合微焙待米熟去米搗用或酒炒麻黃害其性輕揚善散發表最速若表虛自汗飲食勞倦雜病自汗肺虛有熱多痰咳嗽以致鼻塞痘瘡倒靨不因寒邪所郁而因熱甚虛人傷風氣虛發喘陰虛火炎以致眩暈頭痛南方類中風癱瘓及平日陽虛腠理不密之人皆禁用汗多亡陽能損人壽戒之戒之春深夏日以至秋初法同禁惟冬月在表真有寒邪傷營見證者宜之若非冬月或無寒邪或寒邪在裡或風傷於衛等症雖發熱惡寒不頭痛身痛而拘急六脈不浮緊者皆不可用雖可汗之症亦不宜過劑汗為心液過汗則心血為之動或亡陽或血溢而成大患中牟產麻黃地冬不積雪其性熱可知利苦辛溫入心肺膀胱大腸四經專司冬令寒邪頭疼身熱脊強去營中寒邪泄衛中風熱輕可去實為發散第一藥麻黃乃太陽經藥兼入肺經肺主皮毛葛根乃陽明經藥兼入脾經脾主肌肉二藥皆輕揚升發而所入不同瘡家用生麻黃與甘草等分或配犀角地黃湯或配竹葉石膏湯或配大生地能令人不出汗使膿水走多其愈乃速誤用者熟地解之一兩解一錢麻黃根節能止汗其性走表能引諸藥至衛而固腠理修治今滎陽中牟者為勝立秋後收莖陰乾其根皮色黃赤近尺者用之折去節根水煎十餘沸以竹片掠去上沫沫令人煩或用醋泡或蜜炙則和亦有生用須煎去沫白芥子害辛熱泄氣昏目動火傷精經云辛走氣氣病無多食辛多食則筋急爪枯即此類也凡肺經有熱與陰虛火炎咳嗽生痰氣虛久咳者法在所忌切勿誤投莖葉動風動氣有瘡瘍痔疾便血者忌芥葉久食則積溫成熱辛散太甚耗人真元昏目發瘡同兔肉食成惡邪病同鯽魚食發水腫陸金云望梅生津食芥墜淚為肝木受病也大葉者良細葉有毛者害人利辛溫入肺胃二經通行經絡發汗散寒利氣疏痰溫中消冷滯辟邪伏祟魔酒服治反胃醋塗散癰疽痰在皮裡膜外者非白芥子不能達修治四月收子曬乾入藥苦桔梗害畢竟升藥凡病氣逆上升不得下降若下焦陰虛而浮及邪在下焦者攻補下焦藥中勿入誤用之定致喘逆變端病屬上焦實症而下焦無病者須與甘草同用利苦辛平色白屬金入肺氣分瀉熱兼入手少陰心足陽明胃二經開提氣血瀉火散寒邪清利頭目喉咽開胸膈滯氣肺火鬱於大腸宜此開之舟楫之劑引諸藥上至高之分以成功風症鬱熱肺經皆不可缺凡痰壅喘促鼻寒目赤喉痹咽痛齒痛口瘡乾咳胸痛腸鳴皆宜苦梗開之甜桔梗一名薺苨又名空沙參寒而利肺甘而解毒修治二月採根曝乾薺苨苗甘桔梗苗苦本經無分別苦梗米泔水浸一夜切片微炒用古法每桔梗四兩用生百合二兩五錢搗膏投水中浸一伏時濾出緩火熬令乾用升麻害性主升發凡下元肝腎不足若用此升之則下元愈虛若陰虛火動咳嗽多痰氣逆嘔吐驚悸怔忡癲狂等症及小兒斑疹痘瘡見標之後法咸忌之誤用多致殆吐血鼻衄者誤服血隨氣升湧出不止利甘辛微苦入脾胃大腸肺四經表散風邪升散火鬱能升陽氣於至陰之下引清氣上行凡氣虛下陷者須其升提陽氣陽氣升故能殺精鬼闢瘴而解百藥毒治寒熱下痢脫肛崩中帶下透痘疹陰虛火升者忌用修治蜀川者為勝二八月採根曬乾刮去粗皮用黃精自然汁浸一宿曝乾去須及頭蘆銼蒸再曝用如嫌過升蜜水炒或醋炒用陳膽星害按南星辛而不守燥而有毒與半夏之性同而烈則過矣非西北人真中風者勿服陰虛燥痰大忌半夏治濕痰南星治風痰是其異矣利辛溫入肝脾肺三經之藥風痰麻痹堪醫破血行胎可慮生南星毒緊而功更烈古人用生南星生附生烏皆四錢五錢非識力精到者不可輕試得防風則不麻得牛膽則燥性減故名膽星即仗製法緩其性得火炮則緩治風痰有效修治九月採根似芋而圓扁陰乾須用一兩以上者佳必以溫湯洗淨仍以白礬湯或入皂角汁浸三日夜日日換水曝乾用若熟用者須於黃土地掘一小坑深五六寸以炭火燒赤以好酒沃之按南星於內瓦盆覆定灰泥固濟一夜取出用急用即火濕紙包於煻灰火中炮裂一法治風熱痰以酒浸一宿桑柴火蒸之常灑酒入甑內令氣猛一伏時取出竹刀切開不麻舌為熟如未熟再蒸至不麻乃止脾虛多痰則以生薑渣和黃泥包南星煨熟去泥焙用造膽星法以南星生研為末臘月取黃牛膽汁和劑納入膽中系懸風處干之年久者彌佳瀉肺次將紫蘇害其味辛溫純陽之草凡病氣虛表虛者及由陰虛寒熱火炎頭疼火升作嘔慎勿投之俗喜其芳香旦暮資食不知泄真元之氣若脾胃寒人多致滑泄往往不覺古稱芳草致豪貴之疾此類是也利辛溫入肺脾胃三經溫中發表解散風寒寬中利氣又解魚蟹毒梗能下氣安胎子可消痰定喘修治夏採莖秋採子五六月連根採收以火煨其根陰乾則經久葉不落九月半枯時收子子炒研用宣通風毒則單用莖去節尤良牛蒡子害其性冷而滑利痘家惟宜血熱便閉之症若氣虛色白大便自利或泄瀉者切勿妄投痧疹不忌泄瀉用之不妨癰疽已潰非便閉亦不宜服利辛苦而寒瀉熱散結除風宣肺氣清咽喉理痰嗽通行諸經開毛竅除熱毒散諸腫瘡瘍為痘疹要藥修治七月採子十月採根凡用子揀淨以酒拌蒸待有白霜重出以布拭去焙乾搗粉用根以竹刀刮去土生布拭了搗絞取汁用杏仁害性溫有毒而沉墜降止散肺經風寒滯氣殊效第有濕痰者勿服以其性潤陰虛咳嗽便閉肺家虛有熱痰者忌風寒外邪非壅逆肺分咳嗽氣急者不得用雙仁者有毒殺人利苦甘辛溫瀉肺氣之逆而平喘咳潤大腸之燥面通氣秘散肺經風寒滯氣故能解肌滌煩熱而降氣行痰余功消積消狗肉制錫毒巴旦杏仁即甜杏仁甘平溫止咳下氣消心腹逆悶修治南苦杏北甜杏皆五月採之凡用湯浸去皮尖炒黃或用面麩炒過研治風寒肺病藥中亦有連皮尖用者取其發散也千金云杏仁作湯如白沫不解者食之令氣壅身熱湯浸隔宿者動冷氣前胡害此散有餘邪熱實痰之藥不可施之少血氣虛之病凡陰虛火熾煎熬真陰凝結為痰而發咳嗽真虛而氣不歸元以致胸脅逆滿頭疼不因於痰而由陰血虛內熱心煩外現寒熱而非實熱與外感者均忌利苦甘辛寒入肺脾肝膀胱四經宣散風寒而解表下氣降火以消痰前胡主降柴胡上升性有不同前胡治風痰與半夏治濕痰貝母治燥痰者各別紫苑害辛散性滑暫用之品陰虛肺熱者不宜專用及多用即用亦須天冬百部麥冬桑皮等藥參用則無害利苦能下氣辛溫潤肺益金故保肺治吐血為下氣化痰潤肺治血痰勞嗽聖藥能開喉痹取惡涎雖入至高善於下趨使氣化及於州都之府小便自利然性溫陰虛肺熱者不宜多用如獨用須地黃麥冬共濟根作節紫色潤軟者良白者名女苑入氣分修治二三月採根陰乾去頭及上用東流水洗淨以蜜浸一宿焙乾用一兩用蜜二分桑白皮害甘寒瀉肺肺中有水氣及肺火有餘者宜之性不純良不宜多用肺虛無火而小便自利者及因風寒而發咳嗽者勿服桑根見地上者名馬額有毒殺人利甘辛而寒瀉肺金之有餘止咳定喘疏小腸之閉滯逐水寬膨消腫治膚脹散瘀血主降氣能止渴下氣清痰修治採無時凡使採十年以上向東畔嫩根銅刀刮去青黃薄皮一重取里白皮切焙乾用或蜜炙入藥其皮中涎勿去之但藥力俱在其上也忌鐵及鉛殭蠶害其功長於祛風化痰散有餘之邪凡中風口噤小兒驚悸夜啼由於心虛神魂不寧血虛經絡勁急所致而無外邪為病者忌之女子崩中產後余痛非風寒客入者亦忌之今世治小兒驚風不問虛實一概混施誤甚利鹹辛平宣入肺脾肝氣味俱薄輕浮而升得清化之氣故能去風化痰散結行經治中風失音頭風齒痛喉痹咽腫丹毒瘙癢等風熱為病消瘰癧拔疔毒下乳汁滅瘢痕治男子陰癢女子崩淋血病因風熱乘肝者宜之血虛勿用也即蠶之病風者用以治風殆取其氣相感歟蠶蛹炒食治風及勞瘦為末飲服治小兒疳瘦長肌肉退熱除蛔蟲敷惡瘡蠶繭甘溫能瀉膀胱相火引清氣上潮於口止消渴一名蠶蛾燒灰酒服治癰腫無頭次日即破又療諸瘡及下血崩淋煮取汁飲止渴反胃除蛔蟲蠶蛻一名馬明退甘平無毒治諸血症療喉痹風癲解諸藥及蟲毒婦人難產斷產皆需之原蠶蛾氣熱性淫固精強陽原蠶沙甘辛溫蠶屬火其性燥燥能勝風去濕主療風濕之病淘淨曬乾炒黃浸酒治支節不遂皮膚頑痹腰腳冷痛冷血瘀血諸病繅絲湯能抑心火而治消渴繭中蛹汁於繭甏下收之繭滷汁治百蟲入內䘌蝕瘙疥白肚蠶及烏爛死蠶敷赤白遊丹斬蝕瘡有根修治四月收採凡使殭蠶不拘早晚但用白色條直者佳先以糯米泔浸一日待蠶桑涎出如蝸涎浮水上然後灑出微火焙乾以布拭淨黃肉毛並黑口甲了用入丸散搗篩如粉入藥竹茹害竹性寒涼胃寒嘔吐及感寒挾食作吐者忌用利甘辛淡寒入心肺胃疏氣逆而平嘔吐噎膈清血熱而療吐衄崩中淡竹茹為上甘竹皮次之凡用竹茹葉瀝須生長甫及一年者為嫩而有力刮去青皮用第二層為鮮竹茹入平嘔逆藥薑汁炒用川貝母害凡風寒濕滯諸痰並禁用貝母故云能入肺治燥非脾家所喜也及食積痰火作嗽濕痰在胃噁心欲吐痰飲作寒熱脾胃濕痰作眩暈及痰厥頭痛中惡吐嘔胃寒作泄法以辛溫燥熱之藥如南星半夏天麻二朮茯苓之類治之者利苦辛微寒消痰潤肺滌熱清心故能解鬱結咳嗽上氣吐血咯血肺癰肺痿喉痹淅貝一名象貝體堅味苦去時感風痰川貝化虛痰土貝形大味苦治外科化痰毒應用有別俱去心修治八月採根根有瓣子黃白色形如聚貝子名曰貝母曝乾先於柳木灰中炮黃擘去內口鼻中有米許大者心一顆後糯米拌炒待米黃去米用涼肺猛將石膏害本解實熱祛暑氣散邪熱止渴除煩之要藥極能寒胃溫熱病多兼陽明若頭痛遍身骨痛而不渴不引飲者邪在太陽未傳陽明不當用七八日來邪已結里內有燥屎往來寒熱宜下之勿用暑氣兼濕作泄脾胃弱者勿用瘧邪不在陽明則不渴亦不宜用產後寒熱由於血虛或由惡露未盡骨蒸勞熱由於脾胃虛寒陰精不足而不由於外感者並勿誤用傷寒陰盛格陽內寒外熱便青舌黑屬寒者誤投之不可救也宜詳察之黃色者令人淋利寒能清熱降火辛能發汗解肌甘能緩脾生津止渴清肺胃之熱故又為斑疹之要品煨石膏經火則寒性減而不甚傷胃修治有軟硬二種軟石膏大塊生於石中作層如壓扁米糕形每層厚數寸有紅白二色紅者不可服瑩白者良研細甘草水飛淨因其寒胃用火煅則不甚傷胃但用之甚少則難見功冰糖拌過則不妨脾胃矣黃芩見脾部竹瀝害寒滑腸有寒痰濕痰及飲食生痰者勿用利甘辛淡寒若熱痰在皮裡膜外者直達以宣通痰在經絡四肢者屈曲而搜剔開失音不語舒肢體攣蜷風痱等證修治伐取淡竹俗謂之光竹須生長甫及一年者嫩而有力多汁而甘去枝葉截去節對劈開架磚上中間火炙兩頭用磁盆承取馬兜鈴害肺虛挾寒者畏之如螫凡咳嗽由於肺家虛寒或寒痰作喘者勿服湯劑中用之多作吐故能吐蠱毒利苦寒清肺滌痰平喘定咳土青木香辛苦冷治鬼疰積聚塗諸毒熱毒熱腫不可多服吐利不止修治七八月採如大棗狀實如鈴去葉及蔓以生絹袋盛於東屋角畔待乾劈開去草膜取淨子焙用採根曝乾用山慈菇害寒涼之品不得過服利甘辛寒入肺胃二經瀉熱癰疽疔毒酒煎服瘰癧瘡痍醋拌塗治毒蛇狂犬之傷敷粉滓斑點之面修治四月初苗枯即掘取葉如蒜根如慈菇及小蒜遲則苗腐難尋去毛殼今人俱稱毛茹菇涼肺次將西洋參見前補陣元參害苦寒性滑血少目昏停飲寒熱支滿血虛腹疼脾虛泄瀉者並不宜服利苦鹹寒壯腎水以制心火清肺金善瀉無根浮游之火兼能明目滋陰色黑味鹹腎家要藥修治三八月採根曝乾或蒸過曬乾用勿犯銅器餌之噎人喉喪人目山梔見心部天花粉害純陰之品脾胃虛寒者忌之利苦寒入心肺脾胃四經清痰解熱能使血不為瘀修治秋冬採根去皮寸切水浸逐日換水四五日取出搗泥以絹衣濾汁澄粉曬乾用今惟去皮切片曝乾用天門冬害大寒而苦不利脾胃虛而泄瀉惡食者大非所宜陰虛精竭之病全賴脾胃氣強能納能消以滋精氣若脾胃先困後天源絕丸餌雖佳總仗於食湯液雖妙終屬於飲又以苦寒損其胃氣致泄瀉惡食則危殆矣若脾胃虛寒人單餌既久必病腸滑反成痼疾以此物性寒而潤能利大腸故也利甘寒保肺潤燥補腎養陰肺腎虛熱之要藥也修治二三七八月採根蒸剝去皮四破去心必須曝於日中或火烘乾用地骨皮害中寒者勿用利甘淡而寒涼血清三焦降肺中伏火除肝腎虛熱治在表無定之風邪主傳屍有汗之骨蒸去風邪者肝有熱則風自內生熱退則風息與外感之風不同能退內潮人所知也能退外潮人實不知病感風寒散而未盡作潮往來非柴葛所能治惟用地骨皮走表又走里之藥消其浮游之邪服之未有不愈者故以青蒿佐之地骨皮退熱屢有奇功盡扶精氣充足而邪火自退何得以芩連知柏之苦寒而傷元氣哉鮮地骨皮汁治吐血尿血天精草苦甘涼清上焦心肺客邪代茶止消渴修治冬採根春夏採葉莖實凡使根掘得以東流水浸刷去土捶去心以熟甘草湯浸一宿焙乾用知母見脾部麥冬見心部薄荷害辛香伐氣多服損肺傷心虛者遠之凡病新瘥勿服以表氣虛也令人虛汗不止咳嗽由肺虛寒客而無熱症者勿服陰虛人發熱勿服恐出汗則易竭其津液也及血虛頭疼小兒身熱由於傷食疳積者禁用每見小兒多食薄荷糕者汗多體弱瘦弱人久食之動消渴病利辛溫一作涼入肺肝芳香開氣發汗解表能下氣故消食治貓咬與蛇傷傷寒舌苔和蜜擦之修治處處有之蘇產為勝夏秋採莖葉曝乾海浮石害大寒潤下咳逆由於虛氣上衝者勿用痰飲由於脾胃元虛者忌之多服損人血氣利鹹寒入肺清金降火能潤下止濁淋化積塊止痰消癭瘤結核修治浮石乃水沫結成色白體輕海中者味鹹入藥為良溫肺猛將麻黃見前天南星見前五味子見心部溫肺次將蘇梗見前款冬花害古今方用為治嗽要藥以其辛溫散而能降於肺無忤無分寒熱虛實皆可酌而施用利辛溫化痰而咳喘何憂清肺則癰痿有賴修治十一月採花蕊未舒者佳陰乾或蜜水炒用製半夏害其性燥而辛溫有毒雖能祛濕分水實脾及開寒濕氣鬱結痰而其所忌者惟陰虛血少津液不足諸病故古人有立禁者謂血家渴家汗家是也故凡一切吐血衄血齒衄舌上出血金瘡產後失血過多尿血便血腎水真陰不足發渴陽虛自汗陰虛盜汗內熱煩燥出汗諸症皆當禁者也三禁之外應忌者尚多茲更詳列於後凡咳嗽由於陰虛而不由於濕痰寒飲嘔吐由於火動胃熱而不由於寒濕痰壅飲食不化由於脾陰不足不由於脾濕少運嘔噦眩悸由於胃弱不由於寒濕痰飲霍亂腹脹由於邪熱客中焦不由於寒濕食滯咽痛由於陰虛火炎不由於傷寒少陰病邪熱不解氣喘由於氣虛不由於風寒所郁頭痛由於血虛不由於痰厥不寐由於心經血少不由於病後膽虛如上諸症法所同禁其誤最易而難明者醫以其能去痰也故凡見咳嗽莫不先投殊不知咳嗽吐痰寒熱骨蒸皆陰虛肺熱津液不足之候誤服則損其津液而肺家愈燥陰氣愈虛濃痰愈結必致聲嗄而死若合參朮禍不旋踵蓋以其本為脾胃藥而非肺腎藥也寒濕痰飲作咳屬胃者固宜然亦百之一二其陰虛火熾煎熬真陰津液化為結痰以致喉癢發咳者往往由之故凡痰中帶血口渴咽乾陰虛咳嗽者大忌服之又有似中風痰壅失音偏枯拘攣及二便閉澀血虛腹痛於法並忌犯之過多則非藥可救孕婦服之能損胎若與參朮並行但有開胃之功亦不損胎利辛溫化痰入肺脾胃消痰燥濕開胃健脾宣通陰陽和胃安臥能墜胎宋製半夏性和而力亦遜戈製半夏內有參附治真中風寒濕痰飲立見奇功近有仙露半夏得七七仙露之氣用之甚可通和陰陽若陰虛火熾切勿妄投生薑半夏曲治淺近諸痰修治八月採根曝乾浸七日逐日換水瀝去涎切片薑汁拌炒以黃牛肉汁煉膏即霞天膏和半夏末為曲名霞天曲治沉疴痼疾造麴法草菴七日待生黃衣懸掛風處愈久愈佳生薑害見脾部溫陣乾薑條下利辛溫入肺胃發表發汗開胃止嘔破血滯痰凝平氣脹腹痛中風中氣中暑中毒中惡霍亂一切猝暴之症用薑汁和童便服薑汁能開痰童便能引火下行姜皮辛涼和脾行水腫家必用修治九月採曝乾白淨結實者良去皮則熱留皮則冷古方以薑茶飲治痢熱痢留皮冷痢去皮或用蜜炙煙害火氣薰灼最爍肺陰耗血損年衛生者宜遠之今人患喉風咽痛嗽血失音之症甚多未必不由嗜煙所致利辛溫入肺行氣辟邪治風寒濕痹滯氣停痰山嵐瘴霧為宣散之品煙管中水能解毒煙油殺蟲最捷諸蟲咬傷塗之病失修治六月採為伏片七月採者則滋膏足而辛甚南人用油窨鑤為絲燒吸北人惟將煙片搓碎納煙筒中燒吸其氣腎部藥隊補腎猛將大熟地害按熟地乃陰滯不行之藥大為脾胃之病所不宜凡胸膈多痰氣道不利升降窒塞藥宜通而不宜滯湯液中應避地黃故用宜斟酌胃虛氣弱之人過服歸地必致痞悶食減病安能愈利甘微溫補脾肝腎養血滋陰為壯水之主藥修治二八月採根揀取肥地黃沉水者數十斤洗去沙土略曬乾別以揀下瘦小者數十斤搗絞取汁投石器中浸漉令浹入柳木甑放瓦鍋上蒸一日曬幾日令極干又曬又蒸如是九次鍋內倘有淋下地黃余汁亦必拌曬使汁盡而干其地黃光黑如漆味甘如飴須瓷器收之以其脂柔喜潤也蓋熟地性泥得之香竄砂仁合和五臟沖和之氣歸宿丹田故用好酒入砂仁末在內拌蒸晾九蒸九晾乃止入藥為良今肆中多用水煎必得酒炒砂仁末拌搗用枸杞子見肝部補陣淫羊藿害虛陽易舉夢遺不止溺赤口乾者並忌若誤服之則病強中淋濁之患利辛溫入腎補大腸三焦強筋骨起陽事衰利小便除莖中痛修治五月採葉莖曬乾根亦可用每一斤用羊脂四兩拌抄待盡為度別名仙靈脾千兩金棄杖草皆矜其功力也北五味見心部補陣補腎次將乾地黃害性寒而潤陰虛咳嗽內熱骨蒸或吐血等候一見脾虛泄瀉胃虛食少或天明腎泄產後泄瀉產後不實俱禁用凡產後惡食作瀉惡露作痛雖見發熱不可用誤用則瀉不止凡見此症宜多加炮薑桂心人參必自愈忌鐵銅器蔥蒜蘿蔔諸血令人腎消榮衛澀發須白利甘寒入心肝腎小腸去瘀生新補陰涼血養陰退陽修治二八月採根曝乾以懷慶肥大而短糯體細皮菊花心者佳大生地亦稱原生地小生地力薄於大生地薑汁浸則不泥膈酒製則不妨脾巴戟天害與淫羊藿同凡病相火熾盛思欲不得溺赤口苦目昏目痛煩躁口渴大便燥閉法咸忌之利甘溫入腎安五臟以益精強筋骨而起陰修治二八月採根打去心陰乾以連珠多肉厚者為勝用酒浸一宿銼焙入藥何首烏見肝部補陣杜仲害腎雖虛而火熾者不用利甘辛溫入肝腎強筋壯骨益腎添精治腰膝疼痛利遍體機關亦治陰下濕癢小便淋瀝修治二五六九月採皮凡使削去粗皮銼或酥炙酒炙蜜炙鹽酒炒薑汁炒斷絲用產湖廣湖南者佳色黃皮薄肉厚如色黑皮厚肉薄不堪用龜板害新刮之甲有毒不宜頻使妊婦不宜用病人虛而無熱者不宜用凡入丸散須研極細不爾留滯腸胃能變癥瘕利鹹寒至陰屬金與水補心增智慧益腎陰治陰虛血弱勞熱骨蒸等症又能固大腸止瀉利龜膠補陰之力更勝龜鹿皆長年龜首藏向腹能通任脈取下甲以補腎補血皆陰也鹿鼻反向尾能通督脈取上角以補火補氣皆陽也修治採無時以自敗大者力勝得陰氣更全也酥炙或酒炙醋炙豬脂炙煅灰用龜板洗淨捶碎水浸三日用桑柴火熬成膠名龜膠合鹿角膠一陰一陽名龜鹿二仙膠治真元虧損精氣枯竭瘦弱少氣目視不明夢遺泄精腰腿無力此能大補精髓益氣養神龜尿走竅透骨染鬚髮治啞聲取龜尿法以鏡照之龜見其影則淫發而尿出今人或以豬棕松毛刺其鼻溺亦出女貞子害純陰至靜之品若虛寒人服之則腹痛作瀉利苦甘涼益肝腎補中黑鬚發明目養精神修治立冬後採取陰乾去梗葉酒浸一日夜袋擦去皮蒸透曬乾用黑大豆害小兒以豆與豬肉同食必壅氣致死十有八九如十歲以上則無害也服萆麻子者終身忌炒豆犯之脹滿致死服厚朴者亦忌之最能動氣故也利甘平補心腎而明目活血散風除熱解毒能消水腫可稀痘瘡黑豆之小者曰馬料豆鹽水煮食尤能補腎料豆之皮曰穭豆衣補腎涼血止汗亦稱黑豆衣修治九月採取大豆莢用生豆炒食極熱煮食甚寒作豉極冷造醬及生黃卷則平牛食之則溫馬食之冷一體之中用之數變胖海參害海味鹹溫血病多熱者勿用修治遼海產者良膠州所出生北海鹹水中色又黑以滋腎水從其類也有刺者名刺參無刺者名光參以水瀹胖剖開去肚中雜泥沙用瀉腎猛將豬苓害淡滲利濕引水有功多用能亡津液久服必損腎氣昏人眼目無濕證者勿服利甘淡平入腎膀胱二經分消水腫淡滲濕痰利水諸藥無如此快修治是楓樹下苓其皮黑色肉白而實者佳二八月採陰乾銅刀削去粗皮薄切瀉腎次將澤瀉害扁鵲云多服令人眼昏凡病人無濕無飲而陰虛及腎氣乏絕陽衰精自流腎氣不固精滑目痛虛寒作泄等症法咸禁用以其淡滲利水久服則降令太過清氣不升真陰潛耗安得不病目耶利甘鹹微寒通腎膀胱水道善去胞胎能止泄精修治八月採根不計多少細銼酒浸一宿取出曝乾任用知母見脾部赤茯苓害見心部補陣茯神條下利甘淡平瀉腎小腸膀胱濕熱功同茯苓而稍遜利水偏長修治大山山谷大松下附根而生二八月採掘取陰乾凡用皮去心搗細於水盆中攪濁浮者濾去之此是茯苓赤筋若誤服餌令人瞳子並黑睛點小兼盲目生米仁見脾部涼腎猛將朴硝芒硝害生於鹵地刮取煎煉在底者為朴硝在上為芒硝有牙者為馬牙硝置風日中消盡水氣清白如粉為風化硝若經甘草水煅過即元明粉究其功用無堅不磨無結不散無熱不蕩無積不推可謂直往無前無留礙之性也非邪結下焦堅實不可按者不用恐誤伐下焦真陰故也病不由於邪熱深固閉結難通斷勿輕投至於血涸津液枯竭以致大腸燥結陰虛精乏以致大熱骨蒸火炎於上以致頭痛目昏口渴耳聾咽痛吐血衄血虛極類實等症切戒勿施庶免虛虛之咎利鹹辛微寒瀉腎火治陽強能蕩三焦腸胃實熱大瀉下泄與大黃功同破血攻痰軟堅消食又能通經墮胎修治採無時青白者佳黃者損人赤者殺人元明粉功緩力少輕明目清燥推陳致新朴硝即皮硝朴硝在下最粗而濁芒硝在上質稍清元明粉再經甘草水煎煉尤為精粹苦參害雖能泄腎中之熱除濕熱生蟲為厲然氣味苦寒能損腎氣肝腎虛而無熱者勿服火衰精冷真元不足及年高之人皆不宜服沈括夢溪筆談云久用苦參擦牙遂病腰痛由其氣傷腎故也利苦寒入腎除熱祛濕治癰腫瘡瘍腸澼下血兼能利水固齒明目祛風殺蟲苦參子一名鴉膽子治腸風下血能清肝明目功同槐實修治八月採子十月採根曝乾糯米濃泔一宿其腥穢氣並浮在水面上須重重淘過即蒸三時取曬切用涼腎次將鮮生地害大寒涼潤必燥結有實火者方可用否則恐寒中餘同乾地黃利苦寒微甘大瀉心腎實火平血逆除大熱修治掘取鮮根洗淨竹刀切片或搗汁用牡丹皮害氣香而濁極易作嘔胃弱服之即吐涼血通瘀故胃氣虛寒婦人血崩經行過期不淨並妊娠者並忌之若無瘀而血熱妄行及血虛而無外感者皆不可用利苦辛微寒入手足少陰厥陰血分涼血去瘀生新瀉血中伏火退無汗骨蒸治相火之功勝於黃柏紅花者利白花者補宜分別之修治牡丹惟取白紅單瓣者入藥二八月採根陰乾以銅刀劈破去骨肉厚者佳銼如大豆許用酒細拌蒸乾用或切片酒炒用知母見脾部滑石害性沉重降能泄上氣令下行本利竅清暑之藥若病人脾虛下陷及陰精不足內熱以致小水短少赤澀或不利煩渴身熱由於陰虛火熾水涸者皆禁用脾腎俱虛者雖作泄勿服傷寒病當發表者尤忌表有邪得此滲泄重降之品必愈陷入里而成敗症矣利甘淡寒入肺脾腎膀胱四經利小便行積滯宣九竅之閉通六腑之結滑石利竅非獨小便也上能利毛竅下能利精竅為蕩熱燥濕之劑故清暑需之修治採無時凡用滑石白而潤者良先以刀刮淨研粉以丹皮同煮一伏時去牡丹皮取滑石以東流水淘過曬乾用惟青黑綠色有毒不入藥用能殺人溫腎猛將破故紙一名補骨脂害此性燥助火凡病陰虛火動陽道妄舉夢遺尿血小便短澀及目赤口苦舌乾大便燥結內熱作渴火升嘈雜濕熱成痿以致骨乏無力者皆忌服能墮胎孕婦忌利辛溫入腎大腸興陽事止腎泄固精氣止腰疼暖則水臟固壯火益水之要藥也修治出南番者色赤嶺南者色黑九月採以酒浸一宿濾出以東流水浸三日夜蒸之三時乾用一法以鹽同炒過曝乾用又有童便人乳浸或胡桃肉拌用等法鹿茸害升陽性熱陰虛而陽浮越者目擊誤用而血脫於上以隕者多人矣而不可嗅之有蟲恐入鼻顙傷腦腎虛有火者不宜用以其偏於補陽也上焦有痰熱胃家有火者亦勿用凡吐血下血俱陰虛火熾者概不可服利甘鹹溫入腎健骨生齒強志益氣治肢體痠疼腰脊軟痛虛勞仙劑崩漏神丹修治鹿角初生長二三寸分岐如鞍紅如瑪瑙破之如朽木者良太嫩者血氣未足無力獵人得鹿縶之取茸然後斃鹿以血未散也最難得不破未出血者四月五月解角時取陰乾酥塗灼去毛微炙不塗酥則傷茸亦有酒炙者鹿角害同鹿茸利鹹溫補腎生精髓強筋骨壯腰膝止崩中與衄血除腹痛而安胎生角散熱行血消腫毒逐惡血熬膏煉霜則專於滋補肉甘溫補中強五臟通脈益氣力鹿腎氣有餘足於精者也茸較佳於角肉有益於脾修治七月採角以鹿年久者其角更好煮以為膠入藥彌佳造膠霜法取新角寸截河水浸七日刮淨桑火煮七日入醋少許取角搗成霜用其汁加無灰酒熬成膠用麋茸麋角功用與鹿相仿而溫性差減鹿補右腎精氣不足者宜之麋補左腎血液不足者宜之修治鹿角堅而麋角大鹿角單而麋角雙凡用麋角可五寸截之中破炭火燒過搗末水和成團以絹袋三五重盛之再煅再和如此五度以牛乳和再燒過研用溫腎次將山茱萸見肝部菟絲子同上大茴香同上艾葉同上胃部藥隊補胃猛將白朮見脾部綿耆見肺部大棗見脾部補胃次將白扁豆見脾部懷山藥同上炙甘草同上龍眼肉同上紅棗見脾部瀉胃猛將石菖蒲見心部枳實見脾部雷丸害赤色者能殺人細揀去用殺蟲之外無他長能令人陰痿利苦寒入胃大腸二經殺臟腑諸蟲除嬰兒百病有蟲者宜之修治竹之餘氣得霹靂而生故名之大小如慄竹刀刮去黑皮甘草水浸一宿酒拌蒸或炮白芥子見肺部萊菔子見脾部六神麯同上瀉胃次將蘇梗見肺部枳殼見脾部蔓荊子害頭痛目痛不因風邪而於血虛有火者忌之胃虛人不可服恐生痰疾利苦辛平入胃肝膽膀胱四經搜頭風除濕痹修治六七八月採子去蒂子下白膜一重用酒浸一伏時蒸之三時熬乾用尋常只去膜打碎用之麥芽見脾部涼胃猛將石膏見肺部犀角見心部涼胃次將天花粉見肺部葛根害傷寒頭痛兼項強腰脊痛及遍身骨疼者是太陽病也邪未入陽明故無渴症不宜服誤服則邪氣反引入陽明為引盜入門也斑疹已見紅點不宜用恐表虛反增斑爛也五勞七傷上盛下虛之人暑月雖有脾胃病亦不宜服當用亦宜少用多則反傷胃氣以其升散太過也夏月表虛汗多尤忌葛根風藥也風藥皆燥本經言其生津止渴生乃升字筆誤非葛根獨能止渴以其升胃氣入肺能生津爾設非清陽下陷而火炎津耗之渴誤服此藥則火借風威燎原莫遏即非陰虛火炎之證凡胃津不足而渴者亦當忌之張司農治暑全書序云柴胡劫肝陰葛根竭胃汁二語可謂開千古之群蒙也故凡汗多勿用前人已論及之無汗亦勿用愚謂陽明胃經多血之所火病燥熱無汗煩渴胃液已傷汗乃血液所化奪汗則無血之戒用者審之利甘辛平入胃大腸二經輕宣解肌發汗升陽生用能墮胎蒸熟散鬱火化酒毒止血痢能舞胃氣上行治虛瀉之聖藥鮮葛根汁大寒治溫病火熱吐衄諸血葛花解酒毒尤良酒毒濕甚而為毒也葛殼即子也甘平治下痢解酒毒葉止金瘡血出蔓消癰腫喉痹修治五月採根曝乾生用或蒸熱用以入土深者為佳今人多作粉食七月採花曬乾八九月採子曝乾冬月掘取生根搗爛入水中揉出澄粉名玉露霜香薷害辛散乃夏月解表之藥表無所感而中熱為病何假於此誤則損人表氣故無表邪者戒之其性溫熱暑寒宜用若暑熱宜清涼誤服之反成大害有處高堂大廈納涼太過飲冷太過陽氣為陰邪所遏反中入內遂病頭痛惡寒煩燥口渴吐瀉霍亂宜用之以發越陽氣散邪和脾則愈若飲食不節勞役斫喪之人傷暑汗出如雨煩躁喘促或瀉或吐者乃內傷之症宜從東垣清暑益氣湯不吐瀉者宜人參白虎桂苓甘露飲之類以瀉火益元若用香薷是重虛其表而益其熱矣利辛微溫入肺胃二經理暑氣霍亂腹痛乘涼飲冷陽氣為陰邪所遏雲云則愈若勞役受暑用之則大誤矣修治八九月開花著穗時採得去根留葉銼曝乾勿令犯火陳久者佳宜待冷服如熱服作瀉經所謂治溫以清涼而行之也石斛害長於清胃除熱惟胃腎有虛熱者宜之虛而無火者不得混用長虛味大苦者名木斛服之損胃利甘淡微寒清胃除虛熱補腎澀元氣療腳膝川石斛少遜鮮石斛性加寒尤退虛熱虛證宜干實證宜鮮修治蜀中者為勝七八月採莖陰乾以桑皮沃之色金形如蚱蜢髀者佳金石斛凡使去根頭用酒浸一宿曝乾以酥拌蒸之五時徐徐焙乾用入補藥乃效或熬膏用川萆薢害若下部無濕陰虛火熾以致溺有餘瀝莖中痛乃真陰不足之候也無濕腎虛腰痛並不宜服以腎惡燥故也利甘平入胃肝膀胱三經主風寒濕痹既可除膀胱宿水又能止失溺便頻祛風濕補下元小便頻莖內痛必火府熱閉只就小腸火府愈加燥竭因強忍房事有瘀腐壅於小腸故痛此與淋症不同宜鹽水炒萆薢一兩煎服以蔥湯頻洗穀道即愈腎受土邪則水衰肝挾相火來復母仇得萆薢滲濕則土安其位水不受侮矣撥葜土茯苓形雖不同而主治之功不相遠矣除濕祛風分清去濁化毒除惡瘡又能補下焦忌茗醋修治二八月採根利刀切片曝乾用知母見脾部蘆根害性味寒涼因寒霍亂作脹因寒反胃嘔吐勿服利甘寒清煩熱亮喉嚨治煩渴嘔逆噎膈反胃利小腸筍性更佳解河豚毒修治二八月掘取肥厚根曬乾去須節並赤黃皮用逆水中鮮者力遜或搗汁取用竹葉見心部溫胃猛將高良薑害如胃火作嘔傷暑霍亂火熱注瀉心虛作痛咸忌之以其辛熱性燥故虛寒人須與參朮同行若單用多用犯沖和之氣也利辛溫熱入脾胃肝三經溫胃去噎膈療心腹之疼痛下氣除邪攻嵐瘴之瘧疾治心脾疼多用良薑寒者用之二錢熱者用四五分於清火劑中取其辛溫下氣止痛有神耳修治出嶺南高州二三月採根炒過入藥亦有同吳茱萸東壁土拌炒過用者紅豆蔻溫肺散寒醒脾燥濕消食解酒禁忌制用同上乾薑見脾部益智仁同上肉豆蔻同上草果同上丁香害辛熱而燥一切有火熱症者忌之非屬虛寒概勿施用利辛溫入肺胃腎三經溫脾胃而止嘔呃理壅滯而消脹滿除䘌齒疳發灰白痘修治八月採子曝乾方中多用雌者為母丁香即雞舌香若用雄者顆小為丁香須出去丁蓋乳子發人背癰也不可見火木香見肝部胡椒見肝部辛夷害辛香走竄之性氣虛人偶感風寒而鼻塞者禁之頭腦痛屬血虛火熾及齒痛屬胃火者服之轉甚毛射入肺中令人咳利入肺胃二經宣散上焦風熱辛溫開竅鼻塞與昏冒咸宜清陽解肌壯熱與憎寒並選味薄而散能助胃中清氣上達高巔頭面九竅皆歸治平也修治九月採實曝去心及外皮毛入藥微焙溫胃次將藿香見脾部砂仁同上白叩仁同上製半夏見肺部烏藥見脾部開口川椒見脾部煨姜見脾部厚朴見脾部膀胱部藥隊補膀胱猛次將藥性略與補腎之藥性同蓋腎氣化則小便自行矣瀉膀胱猛將羌活獨活害此風藥也為祛風散寒除濕之要品若血虛頭痛遍身疼痛骨痛因而作寒熱者俱屬內傷症二活皆是風藥能燥血均忌誤用必反劇利皆苦辛平治風寒濕痹筋骨攣腫頭痛眩掉頸項難伸本入手足太陽表裡引經又入足厥陰氣分小無不入大無不通故既散肌表八風之邪兼理周身百節之痛中國者為獨活色黃氣緩可理伏風西羌者為羌活色紫氣雄可理遊風羌性猛獨性緩獨活不搖風而治風浮萍不沉水而利水因其所勝而為制也修治二八月採根曝乾去皮或焙用麻黃見肺部漢防己害下焦血分濕熱之要藥然其性悍氣猛走竄決防苦傷胃凡胃虛陰虛自汗盜汗口苦舌乾腎虛小水不利及胎前產後血虛雖有下焦濕熱慎勿用之東垣云防己大苦大寒瀉血中濕熱亦瞑眩之藥也服之使人心身煩亂飲食減少若虛人用防己其害有三穀食已虧復泄大便則重亡其血此不可用其害一也如人大渴引飲是熱在上焦肺經氣分而防己乃下焦血分藥此不可用之者其害二也外傷風寒邪傳肺經氣分而小便黃赤乃至不通此上焦氣病禁用血藥此不可用者其害三也大抵上焦濕熱者皆不可用也利苦辛寒入膀胱亦通行十二經祛下焦血分之濕熱通二便木防己用治風症修治二八月採陰乾以車前草根相對蒸半日曬乾用今惟去皮銼酒洗曬乾用木通見心部葶藶見肺部豬苓見腎部瀉膀胱次將獨活見前防風害升浮之性易動肝木若似中風產後血暈痙急諸病頭痛因於血虛不因於風寒泄瀉不因於寒濕及二便閉澀小兒脾虛發搐慢驚脾風氣升作嘔火升作嗽陰虛盜汗陽虛自汗等病法所同忌能瀉肺實誤服瀉人上焦元氣叉頭者令人發狂叉尾者發人痼疾利甘辛溫入肺膀胱二經治大風惡風風邪周痹頭面浮風眼赤多淚能防禦外風故名卑賤之職隨所引而至乃風藥中之潤劑也修治青州黃潤者良軟蘆糯體登州萊陽次之關東者性硬不佳十二月採根曝乾切用蒲黃害性滑動血一切勞傷發熱陰虛內熱無瘀血者禁用瘀因寒滯者忌投多食令人自利極能虛人利甘平生用行血炒黑止血入東方血海兼入州都故又能利小便修治凡使勿用松黃並黃蒿真蒲黃鬚隔三重紙焙令色黃蒸半日卻再焙乾用之妙此即香蒲花中蕊屑湯成入藥生滑破血炒澀止血川楝子見肝部前胡見肺部藁本害氣雄上升能耗血液凡溫病頭痛發熱口渴或骨疼及傷寒發於春夏陽證頭疼產後血虛火炎皆不宜服利辛溫理大腸小腸膀胱寒濕治風家巔頂作痛女人陰腫疝疼澤瀉見腎部蔥白害發散之品病人表虛易汗者勿食病已得汗勿再進多食蔥令人神昏損發須虛氣上衝同蜜食下利壅氣殺人名甜砒霜同棗食令人病正月食生蔥令人面上起遊風利辛散輕平入肺胃肝膀胱發汗解肌通上下陽氣氣通則血活故治諸血通氣則解毒故殺諸毒宣風濕利耳鳴通二便宣解用白鬚通竅用青蔥管修治大管冬蔥入藥為良蔥白連須用採無時甘遂害其性陰毒雖善下水除濕然能耗損真陰虧竭津液元氣虛人除傷寒水結胸不得不用外其餘水腫鼓脹小便頻多脾陰不足土虛不能制水以致水氣氾濫者皆不宜用河間云諸濕腫滿皆屬脾土法應補脾實土兼利小便而反用甘遂下之是重虛其本也水既暫去復腫必死矣必察病屬濕熱有飲有水而元氣尚壯乃可一施不然多致不起戒之須慎利苦甘寒瀉腎膀胱及隧道水濕逐留飲水脹攻痞結疝瘕仲景治心下留飲與甘草同行取其相反以立功凡水脹以甘遂塗腹繞臍內服甘草湯其腫便消二物相反而感應如神修治二八月採根陰乾用東流水浸去黑水麵裹煨熟用以去其毒入丸散搗為末涼膀胱猛將龍膽草見肝部涼膀胱次將車前子見心部綿茵陳害按茵陳雖為黃疸主藥須分陰黃陽黃陽黃宜茵陳陰黃宜溫補若用茵陳多致不救蓄血發黃不可誤用利苦寒入膀胱除濕熱利小腸鈴子茵陳山陰茵陳力俱峻修治五七月採莖陰乾去根細銼勿令犯火海金沙害淡滲無補小便下利及諸淋由於腎水虧真陰不足者勿服利苦寒入小腸膀胱除濕熱消腫滿清血分利水道惟熱在太陽經血分者宜之修治七月收其全料於日中曝小干以紙襯承以杖擊之有細沙落紙上且暴且擊以盡為度其沙及草皆可入藥黃柏見脾部溫膀胱猛將淡吳萸見肝部溫膀胱次將烏藥見脾部茴香見肝部膽部藥隊補膽猛將烏梅見肝部補膽次將棗仁見心部瀉膽猛將桔梗見肺部青皮見肝部香附見肝部瀉膽次將秦艽害泄散疏利之品凡下部虛寒小便不禁大便滑者勿服利苦寒平入胃肝膽大小腸五經祛風活絡養血舒筋退熱退黃利濕通淋修治二八月採根曝乾用形作羅紋相交長大白左紋者良川芎見肝部火麻仁害多食損血脈滑精氣痿陽事婦人多食即髮帶疾以其滑利下行走而不守也腸滑者尤忌利甘平入脾胃潤五臟通大腸滑利下行走而不守宣風利關節催生療難產修治七月七日採良九月採入土者損人極難去殼裹沸湯中待冷懸井中一夜曬乾就新瓦上去殼用麻仁一物詢之藥肆所備每每誤用須分別書之潤燥通腸閉催生則用火麻仁即大麻仁如滋陰養肝則用黑芝麻又一種四方稜而小者名巨勝子味苦平肝明目又一種大胡麻名胡麻仁一名壁蝨胡麻一名亞麻能祛風濕瘡癬疥癩又小胡麻一名三角胡麻即茺蔚子一名益母子通經活血平肝祛風用者宜審升麻見肺部紫草茸害苦寒性滑通利九竅痘瘡家氣虛脾胃弱泄瀉不思食小便清白者俱禁用痘疹若出而紅活及白陷大腸利者切宜忌之利苦寒入心包肝大小腸四經涼血和血通大小腸宣發痘疹清解瘡瘍修治二月採根陰乾其根頭有白毛如茸未花時採則根色鮮明去頭並兩畔髭以石壓扁曝乾細銼用瀉大腸次將秦艽見膽部旋覆花害走散之藥病人涉虛者不宜多服冷利大腸虛寒人禁用利味鹹微溫兼苦入肺肝大腸三經咸能軟堅能祛老痰結積溫能解散咸可潤下故治風氣濕痹大腸燥結又能通脈草名金沸功用相仿修治六月至九月採花去蕊並殼及蒂子蒸曬乾用有細毛恐射肺令人嗽須用絹包好入煎劑郁李仁害性專下降善導大腸燥結利周身水氣然下後令人津液虧損燥結愈甚乃治標急救之藥津液不足者慎勿輕投利味苦甘辛平入脾大腸二經潤燥行水下氣破血得酒入膽治不寐修治五月採核搗碎取仁先以湯浸去皮尖用生蜜浸一宿漉出陰乾研如膏用杏仁見肺部大腹皮見脾部白芷見脾部涼大腸猛將黃芩見脾部黃柏同上涼大腸次將梨子害寒冷涼中肺寒咳嗽脾家泄瀉腹痛冷積寒痰痰飲婦人產後小兒痘後胃冷嘔吐西北真中風證及金瘡法咸忌之經云形寒飲冷則傷肺此之謂也又云寒則血凝泣多食成冷痢利味酸甘寒入心肺脾肝大腸五經外宣風氣內滌狂煩消痰醒酒人知清火消痰不知散風之妙生食可清六腑之熱熟食可滋五臟之陰虛火宜熟實火宜生梨汁潤腸清痰止嗽治痰嗽宜加入薑汁蜜水修治七月採今北人每於樹上包裹過冬乃摘亦妙地榆炭害性寒而下行凡脾胃虛寒作泄法並禁用白痢久而胃弱胎產虛寒泄瀉血崩脾虛作泄等症亦在禁例利味苦寒入肝大腸二經止血痢腸風除帶下五漏善主下焦血症兼去濕熱修治二八月採似柳根外黑裡紅取上截切片炒黑用槐角見膽部知母見脾部連翹見心部溫大腸猛將胡椒見肝部破故紙見腎部枸杞子見肝部溫大腸次將當歸見心部小腸部藥隊補小腸猛將生地見腎部瀉小腸猛將木通見心部瀉小腸次將瞿麥害善下逐性猛利能墜胎孕婦忌胎前產後一切虛人患小水不利者禁用水腫蠱脹脾虛者並忌之小腸無火熱者忌服利味苦寒入小腸膀胱二經利水破血出刺墜胎八正散用為利小便之主藥若心經雖熱而小腸虛者忌用恐心熱未除而小腸復病矣當求其屬以衰之修治七月採凡使只用蕊殼不用莖葉若一時同使即空心令人氣噎小便不禁也用時以竹瀝浸一伏時漉曬海金沙見膀胱部川楝子見肝部薏苡仁見脾部赤芍見肝部茯苓見腎部燈芯見心部三焦部藥隊補三焦猛將淫羊藿見腎部嫩黃耆見肺部瀉三焦猛將青皮見肝部木香見肝部瀉三焦次將柴胡見肝部香附見肝部涼三焦次將梔子見心部麥冬見心部川黃柏見脾部地骨皮見肺部青蒿子見肝部連翹見心部溫三焦次將臺烏藥見脾部白蔻仁見脾部紫衣胡桃害動風痰助腎火肺家有痰熱命門火熾陰虛吐衄等症皆不宜施多食動風生痰傷肺脫人眉令人噁心吐水吐食物同酒食多令人咯血利味甘熱而潤入肺肝腎三經溫肺補腎而通命門峻補下焦潤腸胃悅肌膚兼胡粉而白髮變黑佐補骨而治痿強陰又云能解虛弱幼兒痰喘服人參胡桃湯喘即定連皮服蓋皮有斂汗之功也但用一味空腹時連皮食之最能固精修治秋冬熟時採之漚爛皮肉取核為果
