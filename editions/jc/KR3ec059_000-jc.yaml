front:
  text: 自序古人有三不朽曰立德其次立功又次立言余何人也豈敢妄發言哉敢於功德自誇耶從幼年來體弱多病思閱方書因從書賈購得吾郡良醫烏鎮逸林僧所遺醫書甚夥自軒歧仲聖逮今諸家注論靡不收採略得心領神會遂棄諸子業從我郡吳古年夫子遊將歷代名醫著述書籍探本窮源隨時就正讀破萬卷講論偏見錯謬之處或自昏黃達旦先生年屆古稀日逐臨症得有餘暇猶不辭倦且諄諄訓曰醫關性命不可苟且一病有一經所發若察脈辨證尤宜加謹恐失之毫釐謬於千里也先生袖出一帙曰本草分隊取其用藥如用兵之意蓋臟腑即地理也處方如布陣也用藥如用兵將也病本在於何經即以君藥主將標於何經為臣使之藥即所以添兵弁識得地理布成陣勢一鼓而戰即能殄滅賊氛即所謂病退也然後調攝得宜起居如常即兵家善後事宜民得安居樂業也苟調度不精一或失機一敗塗地即用藥不審草菅人命也奈近時醫者一到病家不先看脈審證遂聽病家自述病情隨即寫藥數味曰某湯主治粗知大略用某藥能除某病如此治病則仁人必深慮而痛恨之雖業醫臨症有望聞問切四診之說然望是觀其氣色如經云青欲如蒼碧之澤不欲如藍也聞是聽其聲音清濁高低即宮商角徵羽五者屬五臟也問是問其老少男女平素勞逸喜惡起患何時始得何病曾服何藥問病源也切是最要之事診得浮沉遲數滑澀大小長短諸脈見於左右寸關尺部辨明虛實表裡寒熱何證發於何經應用寒熱溫涼之藥定方進藥君臣佐使配合得宜如湯沃雪諸恙若失方能起死回生豈有害哉凡藥有利必有害但知其利不知其害如衝鋒於前不顧其後也餘業是道二十餘年遇證則慎思明辨然後下筆補偏救弊貽誤者少審識藥品出產形狀親嘗氣味使藥肆中不敢偽充而誤人耳先生之分隊一書尚未刊行於世遂集各家本草補入藥之害於病者逐一加註更曰本草害利欲求時下同道知藥利必有害斷不可粗知大略辨證不明信手下筆枉折人命用是不揣固陋集古今名醫之說刪繁就簡撰述成書以付剞劂公諸同好並就正於海內明眼亦慎疾之一端云爾咸豐壬戌年吳興凌奐曉五自序
